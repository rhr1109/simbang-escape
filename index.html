function initAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function stopBgm() {
    bgmNodes.forEach(n => { try { n.stop(); } catch(e){} });
    bgmNodes = [];
    bgmPlaying = false;
}

function playBgm(stageIdx) {
    if (!audioCtx) return;
    stopBgm();
    let m = STAGE_MUSIC[stageIdx % STAGE_MUSIC.length];
    let baseFreq = 220; // A3
    let now = audioCtx.currentTime;
    let beatLen = m.tempo / 1000;

    // 멜로디
    function scheduleLoop(notes, freqMult, waveType, volume, detune) {
        let loopLen = notes.length * beatLen;
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        osc.type = waveType;
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        gain.gain.value = volume;

        // 루프 스케줄링 (30초분)
        for (let rep = 0; rep < Math.ceil(30 / loopLen); rep++) {
            notes.forEach((note, i) => {
                let t = now + rep * loopLen + i * beatLen;
                let freq = baseFreq * freqMult * Math.pow(2, note / 12);
                osc.frequency.setValueAtTime(freq, t);
                // 각 음 시작에 약간의 어택
                gain.gain.setValueAtTime(volume, t);
                gain.gain.setValueAtTime(volume * 0.7, t + beatLen * 0.8);
            });
        }
        osc.start(now);
        osc.stop(now + 30);
        bgmNodes.push(osc);
        // 30초 후 반복
        osc.onended = () => { if (bgmPlaying) playBgm(stageIdx); };
    }

    bgmPlaying = true;
    scheduleLoop(m.notes, 1, m.wave, m.vol, 0);
    scheduleLoop(m.bass, 0.5, 'sine', m.vol * 0.8, 0);
}

                buildings.push({ x: i * 300 + Math.random() * 100, width: 200 + Math.random() * 150, height: 200 + Math.random() * 150, type: 'mountain_peak' });
            }
            for (let i = 0; i < 15; i++) {
                buildings.push({ x: i * 120 + Math.random() * 40, width: 20 + Math.random() * 15, height: 50 + Math.random() * 50, type: 'pine_tree' });
            }
            for (let i = 0; i < 8; i++) bgDecor.push({ x: Math.random() * 2000, type: 'rock' });
            break;
        case 'highway':
            for (let i = 0; i < 8; i++) {
                buildings.push({ x: i * 200 + Math.random() * 60, width: 60, height: 25 + Math.random() * 10, type: 'highway_car', carColor: `hsl(${Math.random() * 360}, 50%, 45%)` });
            }
            for (let i = 0; i < 30; i++) bgDecor.push({ x: i * 70, type: 'lane_mark' });
            for (let i = 0; i < 6; i++) bgDecor.push({ x: i * 250, type: 'guardrail' });
            break;
        case 'terminal':
            buildings.push({ x: 0, width: 400, height: 130, type: 'terminal_building' });
            buildings.push({ x: 500, width: 350, height: 120, type: 'terminal_building' });
            for (let i = 0; i < 6; i++) {
                buildings.push({ x: i * 200 + 50, width: 70, height: 35, type: 'bus', busColor: `hsl(${[120, 200, 35, 0, 270, 180][i]}, 55%, 40%)` });
            }
            for (let i = 0; i < 4; i++) bgDecor.push({ x: i * 300 + 80, type: 'luggage' });
            break;
        case 'train':
            buildings.push({ x: 0, width: 500, height: 80, type: 'platform_roof' });
            buildings.push({ x: 550, width: 450, height: 80, type: 'platform_roof' });
            for (let i = 0; i < 20; i++) bgDecor.push({ x: i * 100, type: 'rail_track' });
            for (let i = 0; i < 3; i++) bgDecor.push({ x: i * 400, type: 'train_car', color: ['#1565C0', '#0D47A1', '#1976D2'][i] });
            break;
        case 'home':
            for (let i = 0; i < 10; i++) {
                let r = Math.random();
                if (r < 0.6) buildings.push({ x: i * 160 + Math.random() * 30, width: 70 + Math.random() * 30, height: 70 + Math.random() * 40, type: 'house', roofColor: `hsl(${Math.random() * 30 + 10}, 60%, 40%)`, wallColor: `hsl(${40 + Math.random() * 20}, 30%, ${70 + Math.random() * 15}%)` });
                else buildings.push({ x: i * 160 + Math.random() * 30, width: 30 + Math.random() * 20, height: 60 + Math.random() * 40, type: 'tree' });
            }
            for (let i = 0; i < 15; i++) bgDecor.push({ x: i * 120, type: 'fence' });
            for (let i = 0; i < 10; i++) bgDecor.push({ x: Math.random() * 2000, type: 'flower', color: `hsl(${Math.random() * 360}, 70%, 65%)` });
            break;
        default:
            for (let i = 0; i < 15; i++) buildings.push({ x: i * 150 + Math.random() * 80, width: 60 + Math.random() * 80, height: 80 + Math.random() * 180, type: 'building', color: `hsl(${Math.random() * 30 + 200}, 20%, ${30 + Math.random() * 20}%)` });
            break;
    }
}

// ========== 입력 ==========
document.addEventListener('keydown', (e) => {
    keys[e.code] = true;
    if (gameState === 'menu' && (e.code === 'Space' || e.code === 'Enter')) { gameState = 'storyIntro'; stageTimer = 0; initStage(); }
    if (gameState === 'storyIntro' && (e.code === 'Space' || e.code === 'Enter')) { gameState = 'playing'; initAudio(); playBgm(currentStage); }
    if (gameState === 'stageClear' && (e.code === 'Space' || e.code === 'Enter')) { currentStage++; if (currentStage >= STAGES.length) gameState = 'ending'; else { gameState = 'storyIntro'; stageTimer = 0; initStage(); } }
    if (gameState === 'gameOver' && (e.code === 'Space' || e.code === 'Enter')) { initStage(); gameState = 'storyIntro'; stageTimer = 0; }
    if (gameState === 'ending' && (e.code === 'Space' || e.code === 'Enter')) { currentStage = 0; totalScore = 0; gameState = 'menu'; }
    if (gameState === 'playing') {
        if (e.code === 'ArrowUp' || e.code === 'KeyW' || e.code === 'Space') doJump();
    }
    e.preventDefault();
});
document.addEventListener('keyup', (e) => { keys[e.code] = false; });

function doJump() {
    if (wife.jumpCount < 2) {
        wife.vy = wife.jumpCount === 0 ? JUMP_FORCE : JUMP_FORCE * 0.85;
        wife.jumpCount++;
    }
}
function doAction() {
    if (gameState === 'menu') { gameState = 'storyIntro'; stageTimer = 0; initStage(); }
    else if (gameState === 'storyIntro') { gameState = 'playing'; initAudio(); playBgm(currentStage); }
    else if (gameState === 'stageClear') { currentStage++; if (currentStage >= STAGES.length) gameState = 'ending'; else { gameState = 'storyIntro'; stageTimer = 0; initStage(); } }
    else if (gameState === 'gameOver') { initStage(); gameState = 'storyIntro'; stageTimer = 0; }
    else if (gameState === 'ending') { currentStage = 0; totalScore = 0; gameState = 'menu'; }
}

// ========== 모바일 터치 ==========
let touchBoost = false;
const btnJump = document.getElementById('btnJump');
const btnBoost = document.getElementById('btnBoost');
const btnAction = document.getElementById('btnAction');

btnJump.addEventListener('touchstart', (e) => { e.preventDefault(); if (gameState === 'playing') doJump(); else doAction(); }, { passive: false });
btnBoost.addEventListener('touchstart', (e) => { e.preventDefault(); touchBoost = true; }, { passive: false });
btnBoost.addEventListener('touchend', (e) => { e.preventDefault(); touchBoost = false; }, { passive: false });
btnBoost.addEventListener('touchcancel', () => { touchBoost = false; });
btnAction.addEventListener('touchstart', (e) => { e.preventDefault(); doAction(); }, { passive: false });

document.addEventListener('touchstart', (e) => {
    let t = e.target;
    if (t === btnBoost || t === btnAction) return;
    e.preventDefault();
    if (gameState === 'playing') doJump(); else doAction();
}, { passive: false });
canvas.addEventListener('click', () => {
    if (gameState !== 'playing') doAction();
});

// ========== 파티클 ==========

}
function addTextParticle(x, y, text, color, sz) {

// ========== 업데이트 ==========
function update() {
    if (gameState === 'storyIntro') { stageTimer++; return; }
    if (gameState !== 'playing') return;
    const stage = STAGES[currentStage];
    stageTimer++;

    if (comboTimer > 0) { comboTimer--; if (comboTimer <= 0) comboCount = 0; }
    if (shakeTimer > 0) shakeTimer--;
    if (messageTimer > 0) messageTimer--;
    if (husband.hitTimer > 0) husband.hitTimer--;

    // 점프 (2단 점프 지원)
    if (wife.jumpCount > 0) {
        wife.vy += GRAVITY;
        wife.y += wife.vy;
        if (wife.y >= GROUND_Y) { wife.y = GROUND_Y; wife.vy = 0; wife.jumpCount = 0; }
    }

    // 가속 (키보드 + 터치)
    if (keys['ArrowRight'] || keys['KeyD'] || touchBoost) wife.speedBoost = Math.min(wife.speedBoost + 0.1, 2.0);
    else wife.speedBoost = Math.max(wife.speedBoost - 0.05, 0);

    // 남편 감속
    let totalSlow = 0;
    husband.slowEffects = husband.slowEffects.filter(e => { e.remaining--; if (e.remaining > 0) { totalSlow += e.amount; return true; } return false; });
    husband.currentSpeed = Math.max(0.3, husband.baseSpeed - totalSlow);
    husband.scared = totalSlow > 0;

    // 남편 점프(회피) 물리
    if (husband.isJumping) {
        husband.jumpVy += 0.8;
        husband.jumpY += husband.jumpVy;
        if (husband.jumpY >= 0) { husband.jumpY = 0; husband.isJumping = false; husband.jumpVy = 0; }
    }

    // 땀방울
    if (husband.scared && Math.random() < 0.12) husband.sweatDrops.push({ ox: Math.random() * 20 - 10, oy: -55 - Math.random() * 15, vy: -1.5 - Math.random(), life: 1 });
    husband.sweatDrops = husband.sweatDrops.filter(d => { d.oy += d.vy; d.vy += 0.1; d.life -= 0.025; return d.life > 0; });

    // 거리 (FIX: bgScroll은 아내 속도 기반으로 - 남편 감속 시 아내가 느려지는 시각적 버그 수정)
    let wifeSpeed = stage.wifeSpeed + wife.speedBoost;
    distance += (husband.currentSpeed - wifeSpeed) * 0.5;
    bgScroll += wifeSpeed + 1;
    let scrollSpeed = (wifeSpeed * 2 + 1) * stage.scrollMult;

    // ========= 아이템 생성 =========
    if (Math.random() < stage.itemRate) {
        let avail = ITEMS.filter(i => i.tier <= stage.maxTier);
        let item = avail[Math.floor(Math.random() * avail.length)];
        let r = Math.random();
        let floatH = 0;
        let needDoubleJump = false;
        if (r < 0.15 + currentStage * 0.015) {
            // 2단 점프 전용 (매우 높은 위치: 150~200)
            floatH = 150 + Math.random() * 50;
            needDoubleJump = true;
        } else if (r < 0.50 + currentStage * 0.02) {
            // 1단 점프로 먹을 수 있는 높이 (50~120)
            floatH = 50 + Math.random() * 70;
        }
        // else: 바닥 (floatH = 0)

        let patterns = ['straight', 'straight', 'sine', 'zigzag'];
        if (currentStage >= 4) patterns.push('sine', 'zigzag', 'dive');
        if (currentStage >= 8) patterns.push('zigzag', 'dive', 'dive');
        let movePattern = needDoubleJump ? 'straight' : patterns[Math.floor(Math.random() * patterns.length)];

        items.push({
            ...item,
            x: canvas.width + 60 + Math.random() * 250,
            y: GROUND_Y - floatH,
            baseY: GROUND_Y - floatH,
            bobOffset: Math.random() * Math.PI * 2,
            sparkle: Math.random() * Math.PI * 2,
            age: 0,
            movePattern: movePattern,
            movePhase: Math.random() * Math.PI * 2,
            needDoubleJump: needDoubleJump,
        });
    }

    // 장애물 생성
    if (Math.random() < stage.obstacleRate) {
        let obs = OBSTACLE_TYPES[Math.floor(Math.random() * OBSTACLE_TYPES.length)];
        obstacles.push({ ...obs, x: canvas.width + 50 + Math.random() * 100, y: GROUND_Y, passed: false, blockedHusband: false, dodged: false, alpha: 0.45 });
    }

    // ========= 아이템 이동 + 충돌 =========
    items = items.filter(item => {
        item.x -= scrollSpeed;
        item.sparkle += 0.08;
        item.age++;
        item.movePhase += 0.06;

        switch (item.movePattern) {
            case 'sine':
                item.y = item.baseY + Math.sin(item.movePhase) * 40;
                break;
            case 'zigzag':
                item.y = item.baseY + ((item.movePhase * 2) % 2 < 1 ? -1 : 1) * Math.sin(item.movePhase * 3) * 35;
                break;
            case 'dive':
                if (item.age > 30) item.y = Math.min(GROUND_Y, item.baseY + (item.age - 30) * 1.5);
                break;
        }

        let wCx = wife.x, wCy = wife.y - 32;
        let iCy = item.y - item.size;
        let dx = Math.abs(item.x - wCx);
        let dy = Math.abs(iCy - wCy);

        if (dx < 35 && dy < 40) {
            comboCount++; comboTimer = 180;
            let mult = Math.min(comboCount, 5);
            let eff = item.slowAmount * (1 + mult * 0.2);
            husband.slowEffects.push({ name: item.name, amount: eff, remaining: item.duration });
            let pts = Math.floor(item.slowAmount * 100 * mult);
            score += pts;

            addParticle(item.x, item.y - item.size, item.color, 20, 8);
            let ct = comboCount > 1 ? ` x${comboCount}` : '';
            addTextParticle(item.x, item.y - item.size - 20, `+${pts}${ct}`, item.color, 22);

            messageText = item.desc; messageTimer = 100; messageColor = item.color;
            triggerItemEffect(item);
            return false;
        }
        return item.x > -80;
    });

    // 장애물 (남편을 가로막거나 남편이 회피)
    obstacles = obstacles.filter(obs => {
        obs.x -= scrollSpeed;
        if (!obs.blockedHusband && !obs.dodged && Math.abs(obs.x - husband.x) < 40) {
            // 남편 회피 시도
            if (stage.dodgeChance > 0 && Math.random() < stage.dodgeChance && !husband.isJumping) {
                obs.dodged = true;
                husband.isJumping = true;
                husband.jumpVy = -12;
                husband.jumpY = 0;
                addTextParticle(husband.x, husband.y - 80, '휙!', '#FF6B6B', 20);
                addParticle(husband.x, husband.y - 10, '#FFD700', 5, 6);
            } else {
                obs.blockedHusband = true;
                husband.slowEffects.push({ name: obs.name, amount: 0.8, remaining: 40 });
                addTextParticle(obs.x, obs.y - 85, `${obs.name}: 어딜!`, '#FFD700', 14);
                addParticle(obs.x, obs.y - 30, '#FFD700', 6, 4);
            }
        }
        if (!obs.passed && !obs.dodged && Math.abs(obs.x - wife.x) < 35) {
            obs.passed = true; obs.alpha = 0.15;
            addTextParticle(obs.x, obs.y - 80, '쓩~', '#00FF88', 16);
        }
        return obs.x > -100;
    });

    // ========= NPC 차단자 업데이트 =========
    npcBlockers = npcBlockers.filter(npc => {
        npc.timer--;
        npc.frameTimer++; if (npc.frameTimer > 5) { npc.frame = (npc.frame + 1) % 4; npc.frameTimer = 0; }
        npc.targetX = husband.x - 30;

        if (!npc.arrived) {
            npc.x += npc.speed;
            if (npc.x >= npc.targetX) { npc.arrived = true; npc.x = npc.targetX; }
        } else {
            npc.x += (npc.targetX - npc.x) * 0.1;
        }
        if (npc.arrived && Math.random() < 0.08) {
            addTextParticle(npc.x + Math.random() * 30, npc.y - 70 - Math.random() * 20, npc.emoji, npc.color, 16);
        }
        return npc.timer > 0;
    });

    // ========= 특수 이펙트 업데이트 =========
    activeEffects = activeEffects.filter(e => {
        e.timer--;
        if (e.type === 'note') { e.x += e.vx; e.y += e.vy; e.vy += 0.03; }
        if (e.type === 'money') { e.x += e.vx; e.y += e.vy; e.vy += 0.08; e.rot += 0.1; }
        if (e.type === 'pray_hand') { if (e.delay > 0) { e.delay--; return true; } e.y += (e.targetY - e.y) * 0.1; }
        if (e.type === 'slap' || e.type === 'holy' || e.type === 'book' || e.type === 'food' || e.type === 'key' || e.type === 'pray') {
            e.x = husband.x;
        }
        return e.timer > 0;
    });

    // 파티클
    particles = particles.filter(p => { p.x += p.vx; p.y += p.vy; if (!p.isText) p.vy += 0.05; p.life -= p.decay; return p.life > 0; });
    clouds.forEach(c => { c.x -= c.speed; if (c.x < -c.width) c.x = canvas.width + c.width; });

    // 애니메이션
    wife.frameTimer++; if (wife.frameTimer > 5) { wife.frame = (wife.frame + 1) % 4; wife.frameTimer = 0; }
    husband.frameTimer++; if (husband.frameTimer > (husband.scared ? 10 : 4)) { husband.frame = (husband.frame + 1) % 4; husband.frameTimer = 0; }

    husband.x = wife.x + Math.min(distance, canvas.width - 200);
    husband.y = GROUND_Y + husband.jumpY;

    if (distance <= 0) { gameState = 'stageClear'; totalScore += score; shakeTimer = 30; shakeIntensity = 10; stopBgm(); }
    if (distance > stage.catchDist + 400) { gameState = 'gameOver'; stopBgm(); }
}

// ========== 형태 그리기 ==========
function drawShapeCircle(x,y,r){ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);}
function drawShapeDiamond(x,y,r){ctx.beginPath();ctx.moveTo(x,y-r);ctx.lineTo(x+r*.75,y);ctx.lineTo(x,y+r);ctx.lineTo(x-r*.75,y);ctx.closePath();}
function drawShapeStar(x,y,r,p){p=p||5;ctx.beginPath();for(let i=0;i<p*2;i++){let R=i%2===0?r:r*.45,a=i*Math.PI/p-Math.PI/2;i===0?ctx.moveTo(x+Math.cos(a)*R,y+Math.sin(a)*R):ctx.lineTo(x+Math.cos(a)*R,y+Math.sin(a)*R);}ctx.closePath();}
function drawShapeHexagon(x,y,r){ctx.beginPath();for(let i=0;i<6;i++){let a=i*Math.PI/3-Math.PI/6;i===0?ctx.moveTo(x+Math.cos(a)*r,y+Math.sin(a)*r):ctx.lineTo(x+Math.cos(a)*r,y+Math.sin(a)*r);}ctx.closePath();}
function drawShapeBurst(x,y,r){ctx.beginPath();for(let i=0;i<16;i++){let R=i%2===0?r:r*.6,a=i*Math.PI/8;i===0?ctx.moveTo(x+Math.cos(a)*R,y+Math.sin(a)*R):ctx.lineTo(x+Math.cos(a)*R,y+Math.sin(a)*R);}ctx.closePath();}
function drawShapeShield(x,y,r){ctx.beginPath();ctx.moveTo(x,y-r);ctx.quadraticCurveTo(x+r,y-r*.6,x+r*.8,y);ctx.quadraticCurveTo(x+r*.5,y+r*.8,x,y+r);ctx.quadraticCurveTo(x-r*.5,y+r*.8,x-r*.8,y);ctx.quadraticCurveTo(x-r,y-r*.6,x,y-r);ctx.closePath();}
function drawShapeBook(x,y,r){ctx.beginPath();ctx.moveTo(x-r*.8,y-r*.9);ctx.lineTo(x+r*.8,y-r*.9);ctx.lineTo(x+r*.8,y+r*.9);ctx.lineTo(x,y+r*.7);ctx.lineTo(x-r*.8,y+r*.9);ctx.closePath();}
function drawShapeCross(x,y,r){let w=r*.35;ctx.beginPath();ctx.moveTo(x-w,y-r);ctx.lineTo(x+w,y-r);ctx.lineTo(x+w,y-w);ctx.lineTo(x+r*.7,y-w);ctx.lineTo(x+r*.7,y+w);ctx.lineTo(x+w,y+w);ctx.lineTo(x+w,y+r);ctx.lineTo(x-w,y+r);ctx.lineTo(x-w,y+w);ctx.lineTo(x-r*.7,y+w);ctx.lineTo(x-r*.7,y-w);ctx.lineTo(x-w,y-w);ctx.closePath();}
function drawShapeNote(x,y,r){ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);}
function drawShapeShockwave(x,y,r){ctx.beginPath();ctx.moveTo(x-r*.6,y-r*.4);ctx.lineTo(x+r*.3,y-r);ctx.lineTo(x+r*.3,y+r);ctx.lineTo(x-r*.6,y+r*.4);ctx.closePath();}
function drawShapeChurch(x,y,r){ctx.beginPath();ctx.moveTo(x,y-r);ctx.lineTo(x+r*.8,y-r*.2);ctx.lineTo(x+r*.6,y-r*.2);ctx.lineTo(x+r*.6,y+r);ctx.lineTo(x-r*.6,y+r);ctx.lineTo(x-r*.6,y-r*.2);ctx.lineTo(x-r*.8,y-r*.2);ctx.closePath();}
function drawShapeHolyStar(x,y,r){drawShapeStar(x,y,r,6);}

function getShapeFn(s){return{circle:drawShapeCircle,diamond:drawShapeDiamond,star:drawShapeStar,hexagon:drawShapeHexagon,burst:drawShapeBurst,shield:drawShapeShield,book:drawShapeBook,cross:drawShapeCross,note:drawShapeNote,shockwave:drawShapeShockwave,church:drawShapeChurch,holystar:drawShapeHolyStar}[s]||drawShapeCircle;}

// ========== 아이템 그리기 ==========
function drawItem(item) {
    ctx.save();
    let bobY = Math.sin(Date.now() * 0.004 + item.bobOffset) * 5;
    let cx = item.x, cy = item.y - item.size + bobY, r = item.size;
    let t = Date.now() * 0.001;

    let ba = 0.1 + Math.sin(t * 3 + item.bobOffset) * 0.05;
    let bg = ctx.createLinearGradient(cx, cy + r, cx, GROUND_Y);
    bg.addColorStop(0, `rgba(0,255,100,${ba * 2})`); bg.addColorStop(1, 'rgba(0,255,100,0)');
    ctx.fillStyle = bg; ctx.fillRect(cx - 12, cy + r, 24, GROUND_Y - (cy + r));

    let gr = 18 + Math.sin(t * 4) * 4;
    let gg = ctx.createRadialGradient(cx, GROUND_Y, 0, cx, GROUND_Y, gr);
    gg.addColorStop(0, 'rgba(0,255,100,0.3)'); gg.addColorStop(1, 'rgba(0,255,100,0)');
    ctx.fillStyle = gg; ctx.beginPath(); ctx.ellipse(cx, GROUND_Y, gr, gr * 0.35, 0, 0, Math.PI * 2); ctx.fill();

    let rp = Math.sin(t * 5 + item.bobOffset) * 0.2 + 0.6;
    ctx.strokeStyle = `rgba(255,215,0,${rp})`; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(cx, cy, r + 7, 0, Math.PI * 2); ctx.stroke();
    for (let i = 0; i < 3; i++) { let a = t * 3 + i * 2.094; ctx.fillStyle = `rgba(255,255,200,${0.7 + Math.sin(t * 8 + i) * 0.3})`; ctx.beginPath(); ctx.arc(cx + Math.cos(a) * (r + 7), cy + Math.sin(a) * (r + 7), 2.5, 0, Math.PI * 2); ctx.fill(); }

    let fn = getShapeFn(item.shape);
    let gd = ctx.createRadialGradient(cx - r * 0.2, cy - r * 0.2, 0, cx, cy, r);
    gd.addColorStop(0, lightenColor(item.color, 60)); gd.addColorStop(0.6, item.color); gd.addColorStop(1, item.color2);
    ctx.fillStyle = gd; fn(cx, cy, r); ctx.fill();
    ctx.strokeStyle = item.color2; ctx.lineWidth = item.tier >= 3 ? 3 : 2; fn(cx, cy, r); ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.beginPath(); ctx.ellipse(cx - r * 0.2, cy - r * 0.25, r * 0.35, r * 0.2, -0.3, 0, Math.PI * 2); ctx.fill();

    ctx.font = `${Math.floor(r * 0.85)}px serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(item.emoji, cx, cy + 1);

    let ab = Math.sin(t * 6) * 4;
    if (item.needDoubleJump) {
        ctx.fillStyle = `rgba(255,100,255,${0.7 + Math.sin(t * 6) * 0.3})`; ctx.font = 'bold 12px Malgun Gothic'; ctx.textBaseline = 'bottom'; ctx.fillText('2단 JUMP!', cx, cy - r - 8 + ab); ctx.fillText('\u25BC\u25BC', cx, cy - r + 1 + ab);
    } else if (item.baseY < GROUND_Y - 20) {
        ctx.fillStyle = `rgba(255,255,0,${0.7 + Math.sin(t * 6) * 0.3})`; ctx.font = 'bold 12px Malgun Gothic'; ctx.textBaseline = 'bottom'; ctx.fillText('JUMP!', cx, cy - r - 8 + ab); ctx.fillText('\u25BC', cx, cy - r + 1 + ab);
    } else {
        ctx.fillStyle = `rgba(0,255,100,${0.7 + Math.sin(t * 6) * 0.3})`; ctx.font = 'bold 11px Malgun Gothic'; ctx.textBaseline = 'bottom'; ctx.fillText('GET!', cx, cy - r - 6 + ab); ctx.fillText('\u25BC', cx, cy - r + 2 + ab);
    }

    ctx.font = 'bold 9px Malgun Gothic'; ctx.textBaseline = 'top';
    let nw = ctx.measureText(item.name).width;
    ctx.fillStyle = 'rgba(0,80,0,0.8)'; roundRect(ctx, cx - nw / 2 - 4, cy + r + 4, nw + 8, 14, 3); ctx.fill();
    ctx.strokeStyle = 'rgba(0,255,100,0.5)'; ctx.lineWidth = 1; roundRect(ctx, cx - nw / 2 - 4, cy + r + 4, nw + 8, 14, 3); ctx.stroke();
    ctx.fillStyle = '#88FF88'; ctx.textAlign = 'center'; ctx.fillText(item.name, cx, cy + r + 6);

    ctx.restore();
}

// ========== 특수 이펙트 렌더링 ==========
function drawActiveEffects() {
    activeEffects.forEach(e => {
        let p = e.timer / e.maxTimer;
        ctx.save();

        switch (e.type) {
            case 'slap': {
                let sz = 80 + (1 - p) * 40;
                let a = p > 0.7 ? 1 : p / 0.7;
                ctx.globalAlpha = a;
                ctx.font = `${Math.floor(sz)}px serif`;
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                let slapX = e.x + Math.sin(e.timer * 0.5) * 5;
                ctx.fillText('👋', slapX, e.y - 40);
                if (p > 0.5) {
                    let ring = (1 - p) * 200;
                    ctx.strokeStyle = `rgba(255,0,0,${(p - 0.5) * 2})`;
                    ctx.lineWidth = 4;
                    ctx.beginPath(); ctx.arc(e.x, e.y - 40, ring, 0, Math.PI * 2); ctx.stroke();
                }
                break;
            }
            case 'shout': {
                for (let i = 0; i < 4; i++) {
                    let rr = (1 - p) * 300 + i * 30;
                    let a = Math.max(0, p - i * 0.1);
                    ctx.strokeStyle = `rgba(255,64,129,${a * 0.6})`;
                    ctx.lineWidth = 3 - i * 0.5;
                    ctx.beginPath(); ctx.arc(e.x, e.y, rr, -0.4, 0.4); ctx.stroke();
                    ctx.beginPath(); ctx.arc(e.x, e.y, rr, Math.PI - 0.4, Math.PI + 0.4); ctx.stroke();
                }
                if (p > 0.5) {
                    let ts = 20 + (1 - p) * 30;
                    ctx.globalAlpha = p;
                    ctx.fillStyle = '#FF4081';
                    ctx.font = `bold ${Math.floor(ts)}px Malgun Gothic`;
                    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    ctx.fillText('여보!!!', e.x + (1 - p) * 150, e.y);
                }
                break;
            }
            case 'holy': {
                let w = 50 + Math.sin(Date.now() * 0.01) * 10;
                let a = p > 0.8 ? (1 - p) / 0.2 : (p < 0.2 ? p / 0.2 : 1);
                let gd = ctx.createLinearGradient(e.x - w / 2, 0, e.x + w / 2, 0);
                gd.addColorStop(0, 'rgba(255,215,0,0)');
                gd.addColorStop(0.3, `rgba(255,215,0,${a * 0.4})`);
                gd.addColorStop(0.5, `rgba(255,255,200,${a * 0.6})`);
                gd.addColorStop(0.7, `rgba(255,215,0,${a * 0.4})`);
                gd.addColorStop(1, 'rgba(255,215,0,0)');
                ctx.fillStyle = gd;
                ctx.fillRect(e.x - w / 2, 0, w, GROUND_Y);
                ctx.globalAlpha = a;
                ctx.font = '40px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText('✝️', e.x, 100 + Math.sin(Date.now() * 0.003) * 10);
                break;
            }
            case 'note': {
                ctx.globalAlpha = Math.min(p * 2, 1);
                let notes = ['♪', '♫', '♬', '🎵'];
                ctx.font = '20px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillStyle = '#AB47BC';
                ctx.fillText(notes[e.noteIdx], e.x, e.y);
                break;
            }
            case 'book': {
                let s = 40 + (1 - p) * 30;
                ctx.globalAlpha = p;
                ctx.font = `${Math.floor(s)}px serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText('📖', e.x, e.y);
                ctx.font = '12px serif'; ctx.fillStyle = '#8B6914';
                for (let i = 0; i < 3; i++) {
                    let tx = e.x + Math.sin(Date.now() * 0.005 + i * 2) * 40;
                    let ty = e.y - 20 + Math.cos(Date.now() * 0.004 + i) * 15;
                    ctx.fillText(['말씀', '은혜', '아멘'][i], tx, ty);
                }
                break;
            }
            case 'money': {
                ctx.globalAlpha = Math.min(p * 2, 1);
                ctx.save(); ctx.translate(e.x, e.y); ctx.rotate(e.rot);
                ctx.font = '18px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText('💵', 0, 0);
                ctx.restore();
                break;
            }
            case 'food': {
                ctx.globalAlpha = p * 0.6;
                for (let i = 0; i < 5; i++) {
                    let fx = e.x + Math.sin(Date.now() * 0.003 + i * 1.5) * 30;
                    let fy = e.y - (1 - p) * 50 - i * 15;
                    ctx.fillStyle = `rgba(200,100,50,${p * 0.3})`;
                    ctx.beginPath(); ctx.arc(fx, fy, 8 + i * 3, 0, Math.PI * 2); ctx.fill();
                }
                ctx.font = '30px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.globalAlpha = p;
                ctx.fillText('🍜', e.x, e.y - 20 + Math.sin(Date.now() * 0.005) * 5);
                break;
            }
            case 'key': {
                ctx.globalAlpha = p;
                let ks = 30 + Math.sin(Date.now() * 0.01) * 5;
                ctx.font = `${Math.floor(ks)}px serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText('🔒', e.x, e.y);
                ctx.strokeStyle = `rgba(255,0,0,${p})`;
                ctx.lineWidth = 3;
                ctx.beginPath(); ctx.moveTo(e.x - 20, e.y - 20); ctx.lineTo(e.x + 20, e.y + 20); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(e.x + 20, e.y - 20); ctx.lineTo(e.x - 20, e.y + 20); ctx.stroke();
                break;
            }
            case 'pray': {
                let a = p > 0.8 ? (1 - p) / 0.2 : 1;
                ctx.globalAlpha = a * 0.3;
                let gd = ctx.createRadialGradient(e.x, GROUND_Y - 50, 0, e.x, GROUND_Y - 50, 150);
                gd.addColorStop(0, 'rgba(255,50,150,0.5)');
                gd.addColorStop(1, 'rgba(255,50,150,0)');
                ctx.fillStyle = gd;
                ctx.beginPath(); ctx.arc(e.x, GROUND_Y - 50, 150, 0, Math.PI * 2); ctx.fill();
                ctx.globalAlpha = a;
                ctx.font = '36px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText('⛪', e.x, 60 + Math.sin(Date.now() * 0.003) * 8);
                break;
            }
            case 'pray_hand': {
                if (e.delay > 0) break;
                ctx.globalAlpha = e.timer / e.maxTimer;
                ctx.font = '28px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText('🤲', e.x, e.y);
                break;
            }
        }
        ctx.restore();
    });
}

// ========== NPC 차단자 그리기 ==========
function drawNpcBlocker(npc) {
    ctx.save();
    ctx.translate(npc.x, npc.y);
    let bounce = Math.sin(npc.frame * Math.PI / 2) * 3;
    ctx.translate(0, bounce);

    ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.beginPath(); ctx.ellipse(0, 0, 18, 5, 0, 0, Math.PI * 2); ctx.fill();

    let la = Math.sin(npc.frame * Math.PI / 2) * 25;
    ctx.save(); ctx.translate(-5, -5); ctx.rotate(la * Math.PI / 180);
    ctx.fillStyle = npc.color; ctx.fillRect(-3, 0, 6, 20);
    ctx.restore();
    ctx.save(); ctx.translate(5, -5); ctx.rotate(-la * Math.PI / 180);
    ctx.fillStyle = npc.color; ctx.fillRect(-3, 0, 6, 20);
    ctx.restore();

    ctx.fillStyle = npc.color;
    ctx.fillRect(-12, -38, 24, 33);

    ctx.fillStyle = '#FFD5B8';
    ctx.beginPath(); ctx.arc(0, -46, 10, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#333';
    ctx.beginPath(); ctx.arc(0, -49, 10, Math.PI, Math.PI * 2); ctx.fill();

    if (npc.arrived) {
        ctx.fillStyle = npc.color;
        ctx.save(); ctx.translate(12, -30); ctx.rotate(0.8); ctx.fillRect(0, -3, 18, 6); ctx.restore();
        ctx.save(); ctx.translate(-12, -30); ctx.rotate(-0.8); ctx.fillRect(-18, -3, 18, 6); ctx.restore();
        // 말풍선
        ctx.fillStyle = 'rgba(255,255,255,0.9)';
        roundRect(ctx, -25, -78, 50, 22, 6); ctx.fill();
        ctx.fillStyle = '#000'; ctx.font = 'bold 10px Malgun Gothic'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(npc.name === '아이들' ? '안가!' : '멈춰!', 0, -67);
        // 타이틀: 말풍선 위
        ctx.fillStyle = npc.color; ctx.font = 'bold 10px Malgun Gothic'; ctx.textBaseline = 'bottom';
        ctx.fillText(npc.name, 0, -80);
        // 타이머 바: 타이틀 위
        let pct = npc.timer / 200;
        ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(-15, -94, 30, 4);
        ctx.fillStyle = npc.color; ctx.fillRect(-15, -94, 30 * Math.min(pct, 1), 4);
    } else {
        ctx.fillStyle = npc.color;
        ctx.save(); ctx.translate(12, -30); ctx.rotate(la * Math.PI / 180 * 0.5); ctx.fillRect(0, -3, 16, 6); ctx.restore();
        ctx.save(); ctx.translate(-12, -30); ctx.rotate(-la * Math.PI / 180 * 0.5); ctx.fillRect(-16, -3, 16, 6); ctx.restore();
        // 타이틀: 머리 위
        ctx.fillStyle = npc.color; ctx.font = 'bold 10px Malgun Gothic'; ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
        ctx.fillText(npc.name, 0, -62);
        // 타이머 바
        let pct = npc.timer / 200;
        ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(-15, -60, 30, 4);
        ctx.fillStyle = npc.color; ctx.fillRect(-15, -60, 30 * Math.min(pct, 1), 4);
    }

    ctx.restore();
}

// ========== 캐릭터 그리기 ==========
function drawWife(x, y, frame, groundY) {
    ctx.save(); ctx.translate(x, y);
    // 그림자: 바닥 고정 + 높이에 따라 크기/투명도 변화
    let sOff = (groundY !== undefined) ? groundY - y : 0;
    let heightRatio = Math.max(0, 1 - sOff / 200);
    let sW = 22 * (0.4 + heightRatio * 0.6);
    let sH = 7 * (0.4 + heightRatio * 0.6);
    let sA = 0.25 * heightRatio;
    ctx.fillStyle = `rgba(0,0,0,${sA})`; ctx.beginPath(); ctx.ellipse(0, sOff, sW, sH, 0, 0, Math.PI * 2); ctx.fill();
    let b = Math.sin(frame * Math.PI / 2) * 3; ctx.translate(0, b);
    let la = Math.sin(frame * Math.PI / 2) * 28;
    // 다리
    ctx.save(); ctx.translate(-6, -6); ctx.rotate(la * Math.PI / 180); ctx.fillStyle = '#FFD5B8'; ctx.fillRect(-4, 0, 8, 22); ctx.fillStyle = '#FF69B4'; ctx.fillRect(-5, 18, 10, 6); ctx.restore();
    ctx.save(); ctx.translate(6, -6); ctx.rotate(-la * Math.PI / 180); ctx.fillStyle = '#FFD5B8'; ctx.fillRect(-4, 0, 8, 22); ctx.fillStyle = '#FF69B4'; ctx.fillRect(-5, 18, 10, 6); ctx.restore();
    // 몸통
    ctx.fillStyle = '#E74C3C'; ctx.beginPath(); ctx.moveTo(-16, -8); ctx.lineTo(16, -8); ctx.lineTo(18, -38); ctx.lineTo(-18, -38); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#C0392B'; ctx.fillRect(-14, -22, 28, 4);
    let as = Math.sin(frame * Math.PI / 2) * 15;
    // 오른팔 + 오른손 (팔 길이 축소: 24->16)
    ctx.save(); ctx.translate(14, -33); ctx.rotate((25 + as) * Math.PI / 180); ctx.fillStyle = '#FFD5B8'; ctx.fillRect(0, -3, 16, 6); ctx.beginPath(); ctx.arc(18, 0, 4, 0, Math.PI * 2); ctx.fill(); ctx.restore();
    // 왼팔 + 왼손 (팔 길이 축소: 24->16)
    ctx.save(); ctx.translate(-14, -33); ctx.rotate((-15 - as) * Math.PI / 180); ctx.fillStyle = '#FFD5B8'; ctx.fillRect(-16, -3, 16, 6); ctx.beginPath(); ctx.arc(-18, 0, 4, 0, Math.PI * 2); ctx.fill(); ctx.restore();
    // 머리
    ctx.fillStyle = '#FFD5B8'; ctx.beginPath(); ctx.arc(0, -50, 14, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#1a1a1a'; ctx.beginPath(); ctx.arc(0, -54, 14, Math.PI, Math.PI * 2); ctx.fill(); ctx.fillRect(-14, -56, 5, 16); ctx.fillRect(9, -56, 5, 16);
    ctx.fillStyle = '#000'; ctx.fillRect(-7, -53, 5, 4); ctx.fillRect(2, -53, 5, 4);
    ctx.strokeStyle = '#000'; ctx.lineWidth = 2.5; ctx.beginPath(); ctx.moveTo(-9, -58); ctx.lineTo(-2, -55); ctx.stroke(); ctx.beginPath(); ctx.moveTo(9, -58); ctx.lineTo(2, -55); ctx.stroke();
    ctx.fillStyle = '#C0392B'; ctx.beginPath(); ctx.arc(0, -44, 4, 0, Math.PI); ctx.fill();
    if (wife.speedBoost > 0.5) { ctx.fillStyle = `rgba(255,100,0,${0.4 + Math.sin(Date.now() * 0.01) * 0.3})`; ctx.font = '16px serif'; ctx.textAlign = 'center'; ctx.fillText('\uD83D\uDCA2', 0, -70); }
    if (wife.jumpCount >= 2) { ctx.fillStyle = `rgba(255,255,100,${0.5 + Math.sin(Date.now() * 0.02) * 0.3})`; ctx.font = '12px serif'; ctx.textAlign = 'center'; ctx.fillText('\u2728', -10, -5); ctx.fillText('\u2728', 10, -10); }
    ctx.restore();
}

    ctx.fillStyle = '#FFD5B8'; ctx.beginPath(); ctx.arc(0, -50, 13, 0, Math.PI * 2); ctx.fill();

    if (scared) {
        ctx.fillStyle = '#FFF'; ctx.beginPath(); ctx.arc(-5, -51, 5.5, 0, Math.PI * 2); ctx.fill(); ctx.beginPath(); ctx.arc(5, -51, 5.5, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(-5, -51, 2.5, 0, Math.PI * 2); ctx.fill(); ctx.beginPath(); ctx.arc(5, -51, 2.5, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(0, -42, 5, 0, Math.PI); ctx.fill();
        husband.sweatDrops.forEach(d => { ctx.fillStyle = `rgba(100,200,255,${d.life})`; ctx.beginPath(); ctx.moveTo(d.ox, d.oy - 4); ctx.quadraticCurveTo(d.ox + 3, d.oy, d.ox, d.oy + 3); ctx.quadraticCurveTo(d.ox - 3, d.oy, d.ox, d.oy - 4); ctx.fill(); });
        ctx.font = '14px serif'; ctx.textAlign = 'center'; ctx.fillText('\uD83D\uDE30', 0, -68 + Math.sin(Date.now() * 0.005) * 4);
    } else {
        ctx.fillStyle = '#000'; ctx.fillRect(-7, -53, 4, 4); ctx.fillRect(3, -53, 4, 4);
        ctx.strokeStyle = '#000'; ctx.lineWidth = 1.5; ctx.beginPath(); ctx.arc(0, -44, 4, 0.1, Math.PI - 0.1); ctx.stroke();
    }
    // 피격 빨간 틴트
    if (husband.hitTimer > 0) {
        let ra = Math.min(husband.hitTimer / 20, 1) * 0.5;
        ctx.globalAlpha = ra;
        ctx.fillStyle = '#FF0000';
        ctx.fillRect(-18, -65, 36, 70);
        ctx.beginPath(); ctx.arc(0, -50, 15, 0, Math.PI * 2); ctx.fill();
    }
    // 점프(회피) 중 이펙트
    if (husband.isJumping) {
        ctx.globalAlpha = 0.6;
        ctx.fillStyle = '#FFD700'; ctx.font = 'bold 14px Malgun Gothic'; ctx.textAlign = 'center';
        ctx.fillText('회피!', 0, -72);
    }
    ctx.restore();
}

function drawObstacle(obs) {
    ctx.save();
    let baseAlpha;
    if (obs.dodged) baseAlpha = 0.2;
    else if (obs.blockedHusband && !obs.passed) baseAlpha = 0.7;
    else if (obs.passed) baseAlpha = 0.15;
    else baseAlpha = 0.4;
    ctx.globalAlpha = baseAlpha;
    ctx.translate(obs.x, obs.y);
    ctx.strokeStyle = obs.blockedHusband && !obs.passed ? 'rgba(255,200,0,0.5)' : 'rgba(150,150,150,0.3)';
    ctx.lineWidth = 1; ctx.setLineDash([3, 3]);
    ctx.strokeRect(-obs.width / 2 - 2, -obs.height - 22, obs.width + 4, obs.height + 22); ctx.setLineDash([]);
    ctx.fillStyle = 'rgba(0,0,0,0.06)'; ctx.beginPath(); ctx.ellipse(0, 0, 16, 4, 0, 0, Math.PI * 2); ctx.fill();
    let bodyColor = obs.blockedHusband && !obs.passed ? obs.color : '#777';
    ctx.fillStyle = bodyColor; ctx.fillRect(-obs.width / 2, -obs.height, obs.width, obs.height);
    if (obs.collar) { ctx.fillStyle = obs.blockedHusband ? '#FFF' : '#BBB'; ctx.fillRect(-8, -obs.height + 2, 16, 5); }
    ctx.fillStyle = '#C8B8A8'; ctx.beginPath(); ctx.arc(0, -obs.height - 8, 11, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#666'; ctx.beginPath(); ctx.arc(0, -obs.height - 11, 11, Math.PI, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#444'; ctx.fillRect(-5, -obs.height - 10, 3, 3); ctx.fillRect(2, -obs.height - 10, 3, 3);
    if (obs.blockedHusband && !obs.passed) {
        // 말풍선
        ctx.globalAlpha = 0.9;
        ctx.fillStyle = 'rgba(255,255,255,0.9)'; roundRect(ctx, -22, -obs.height - 38, 44, 18, 5); ctx.fill();
        ctx.fillStyle = '#C00'; ctx.font = 'bold 10px Malgun Gothic'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('어딜!', 0, -obs.height - 29);
        // 타이틀: 말풍선 위
        ctx.globalAlpha = 1;
        ctx.fillStyle = obs.color; ctx.font = 'bold 10px Malgun Gothic'; ctx.textBaseline = 'bottom';
        ctx.fillText(obs.name, 0, -obs.height - 40);
    } else if (obs.dodged) {
        // 말풍선
        ctx.globalAlpha = 0.8;
        ctx.fillStyle = 'rgba(255,255,255,0.9)'; roundRect(ctx, -15, -obs.height - 38, 30, 18, 5); ctx.fill();
        ctx.fillStyle = '#F90'; ctx.font = 'bold 10px Malgun Gothic'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('?!', 0, -obs.height - 29);
        // 타이틀: 말풍선 위
        ctx.globalAlpha = 0.6;
        ctx.fillStyle = obs.color; ctx.font = 'bold 10px Malgun Gothic'; ctx.textBaseline = 'bottom';
        ctx.fillText(obs.name, 0, -obs.height - 40);
    } else {
        // 말풍선 없을 때: 타이틀만 머리 위에
        ctx.globalAlpha = baseAlpha;
        ctx.fillStyle = '#999'; ctx.font = 'bold 9px Malgun Gothic'; ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
        ctx.fillText(obs.name, 0, -obs.height - 22);
        if (!obs.passed) { ctx.globalAlpha = 0.3; ctx.fillStyle = '#888'; ctx.font = '8px Malgun Gothic'; ctx.fillText('- 자동통과 -', 0, -obs.height - 12); }
    }
    ctx.restore();
}

// ========== 배경 ==========
function drawBackground() {
    const s = STAGES[currentStage];
    // 하늘
    let g = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
    g.addColorStop(0, s.bgColor1); g.addColorStop(1, lightenColor(s.bgColor1, 40));
    ctx.fillStyle = g; ctx.fillRect(0, 0, canvas.width, GROUND_Y);

    // 구름
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    clouds.forEach(c => { ctx.beginPath(); ctx.arc(c.x, c.y, c.width * 0.25, 0, Math.PI * 2); ctx.arc(c.x + c.width * 0.2, c.y - 10, c.width * 0.2, 0, Math.PI * 2); ctx.arc(c.x + c.width * 0.4, c.y, c.width * 0.3, 0, Math.PI * 2); ctx.fill(); });

    // 스테이지별 배경 오브젝트
    let scrollX = bgScroll * 0.3;
    drawStageBgObjects(s.bgType, scrollX);

    // 지면
    let gg = ctx.createLinearGradient(0, GROUND_Y, 0, canvas.height);
    gg.addColorStop(0, s.bgColor2); gg.addColorStop(1, darkenColor(s.bgColor2, 40));
    ctx.fillStyle = gg; ctx.fillRect(0, GROUND_Y, canvas.width, canvas.height - GROUND_Y);
    ctx.strokeStyle = darkenColor(s.bgColor2, 20); ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(0, GROUND_Y); ctx.lineTo(canvas.width, GROUND_Y); ctx.stroke();

    // 스테이지별 지면 디테일
    drawStageGroundDecor(s.bgType, scrollX);
}

function drawStageBgObjects(bgType, scrollX) {
    buildings.forEach(b => {
        let bx = ((b.x - scrollX) % (canvas.width + 300));
        if (bx < -(b.width || 100) - 50) bx += canvas.width + 300;

        switch (b.type) {
            case 'tree': {
                // 나무 줄기
                ctx.fillStyle = '#6B4226';
                ctx.fillRect(bx + b.width * 0.35, GROUND_Y - b.height * 0.6, b.width * 0.3, b.height * 0.6);
                // 나무 잎
                ctx.fillStyle = '#2D8B2D';
                ctx.beginPath(); ctx.arc(bx + b.width * 0.5, GROUND_Y - b.height * 0.65, b.width * 0.5, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#3AA03A';
                ctx.beginPath(); ctx.arc(bx + b.width * 0.35, GROUND_Y - b.height * 0.55, b.width * 0.35, 0, Math.PI * 2); ctx.fill();
                break;
            }
            case 'church_building': {
                // 교회 건물
                ctx.fillStyle = '#F5F0E8';
                ctx.fillRect(bx, GROUND_Y - b.height, b.width, b.height);
                // 지붕
                ctx.fillStyle = '#8B4513';
                ctx.beginPath(); ctx.moveTo(bx - 5, GROUND_Y - b.height); ctx.lineTo(bx + b.width / 2, GROUND_Y - b.height - 40); ctx.lineTo(bx + b.width + 5, GROUND_Y - b.height); ctx.closePath(); ctx.fill();
                // 십자가
                ctx.fillStyle = '#DAA520';
                ctx.fillRect(bx + b.width / 2 - 3, GROUND_Y - b.height - 60, 6, 25);
                ctx.fillRect(bx + b.width / 2 - 10, GROUND_Y - b.height - 52, 20, 5);
                // 창문 (스테인글라스)
                ctx.fillStyle = 'rgba(100,150,255,0.6)';
                ctx.beginPath(); ctx.arc(bx + b.width / 2, GROUND_Y - b.height + 40, 12, Math.PI, 0); ctx.fillRect(bx + b.width / 2 - 12, GROUND_Y - b.height + 40, 24, 20); ctx.fill();
                ctx.fillStyle = 'rgba(255,200,100,0.5)';
                ctx.beginPath(); ctx.arc(bx + b.width / 2, GROUND_Y - b.height + 40, 8, Math.PI, 0); ctx.fill();
                // 문
                ctx.fillStyle = '#5D3A1A';
                ctx.fillRect(bx + b.width / 2 - 10, GROUND_Y - 40, 20, 40);
                break;
            }
            case 'car': {
                // 자동차
                ctx.fillStyle = b.carColor;
                roundRect(ctx, bx, GROUND_Y - b.height - 8, b.width, b.height, 4); ctx.fill();
                // 차 윗부분
                ctx.fillStyle = lightenColor(b.carColor, 20);
                roundRect(ctx, bx + b.width * 0.2, GROUND_Y - b.height - 20, b.width * 0.6, 14, 4); ctx.fill();
                // 창문
                ctx.fillStyle = 'rgba(180,220,255,0.7)';
                ctx.fillRect(bx + b.width * 0.25, GROUND_Y - b.height - 18, b.width * 0.2, 10);
                ctx.fillRect(bx + b.width * 0.52, GROUND_Y - b.height - 18, b.width * 0.2, 10);
                // 바퀴
                ctx.fillStyle = '#222';
                ctx.beginPath(); ctx.arc(bx + b.width * 0.25, GROUND_Y - 6, 6, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(bx + b.width * 0.75, GROUND_Y - 6, 6, 0, Math.PI * 2); ctx.fill();
                break;
            }
            case 'building': {
                ctx.fillStyle = b.color; ctx.fillRect(bx, GROUND_Y - b.height, b.width, b.height);
                ctx.fillStyle = 'rgba(255,255,150,0.4)';
                for (let wy = GROUND_Y - b.height + 15; wy < GROUND_Y - 10; wy += 22)
                    for (let wx = bx + 8; wx < bx + b.width - 8; wx += 18)
                        ctx.fillRect(wx, wy, 8, 10);
                break;
            }
            case 'tall_building': {
                ctx.fillStyle = b.color; ctx.fillRect(bx, GROUND_Y - b.height, b.width, b.height);
                // 좁은 창문
                ctx.fillStyle = 'rgba(255,230,150,0.5)';
                for (let wy = GROUND_Y - b.height + 10; wy < GROUND_Y - 5; wy += 18)
                    for (let wx = bx + 5; wx < bx + b.width - 5; wx += 14)
                        ctx.fillRect(wx, wy, 5, 8);
                break;
            }
            case 'stall': {
                // 시장 노점
                ctx.fillStyle = '#8B6914';
                ctx.fillRect(bx, GROUND_Y - b.height + 15, b.width, b.height - 15);
                // 천막
                ctx.fillStyle = b.awningColor;
                ctx.beginPath(); ctx.moveTo(bx - 5, GROUND_Y - b.height); ctx.lineTo(bx + b.width + 5, GROUND_Y - b.height);
                ctx.lineTo(bx + b.width + 8, GROUND_Y - b.height + 18); ctx.lineTo(bx - 8, GROUND_Y - b.height + 18); ctx.closePath(); ctx.fill();
                // 줄무늬
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                for (let sx = bx; sx < bx + b.width; sx += 12) ctx.fillRect(sx, GROUND_Y - b.height, 6, 18);
                // 상품 (색깔 동그라미)
                for (let i = 0; i < 4; i++) {
                    ctx.fillStyle = `hsl(${(i * 90 + b.x) % 360}, 60%, 55%)`;
                    ctx.beginPath(); ctx.arc(bx + 12 + i * (b.width - 20) / 4, GROUND_Y - b.height + 30, 6, 0, Math.PI * 2); ctx.fill();
                }
                break;
            }
            case 'park_tree': {
                // 공원 나무 (둥근 잎)
                ctx.fillStyle = '#5D3A1A';
                ctx.fillRect(bx + b.width * 0.4, GROUND_Y - b.height * 0.5, b.width * 0.2, b.height * 0.5);
                let r = b.width * 0.55;
                ctx.fillStyle = '#228B22';
                ctx.beginPath(); ctx.arc(bx + b.width * 0.5, GROUND_Y - b.height * 0.55, r, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#2EA02E';
                ctx.beginPath(); ctx.arc(bx + b.width * 0.35, GROUND_Y - b.height * 0.65, r * 0.7, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(bx + b.width * 0.65, GROUND_Y - b.height * 0.6, r * 0.65, 0, Math.PI * 2); ctx.fill();
                break;
            }
            case 'bench': {
                ctx.fillStyle = '#8B5E3C';
                ctx.fillRect(bx, GROUND_Y - 20, b.width, 5);
                ctx.fillRect(bx + 5, GROUND_Y - 20, 4, 20);
                ctx.fillRect(bx + b.width - 9, GROUND_Y - 20, 4, 20);
                ctx.fillStyle = '#6B4226';
                ctx.fillRect(bx, GROUND_Y - 30, 3, 15);
                ctx.fillRect(bx + b.width - 3, GROUND_Y - 30, 3, 15);
                break;
            }
            case 'lamp_post': {
                ctx.fillStyle = '#555';
                ctx.fillRect(bx + 10, GROUND_Y - 90, 5, 90);
                ctx.fillStyle = '#777';
                ctx.fillRect(bx + 3, GROUND_Y - 92, 19, 5);
                ctx.fillStyle = 'rgba(255,255,200,0.3)';
                ctx.beginPath(); ctx.arc(bx + 12, GROUND_Y - 95, 8, 0, Math.PI * 2); ctx.fill();
                break;
            }
            case 'apt_building': {
                ctx.fillStyle = b.color; ctx.fillRect(bx, GROUND_Y - b.height, b.width, b.height);
                // 발코니 (불빛 고정 패턴 - 깜빡임 방지)
                let winIdx = 0;
                for (let wy = GROUND_Y - b.height + 20; wy < GROUND_Y - 10; wy += 30) {
                    for (let wx = bx + 8; wx < bx + b.width - 15; wx += 24) {
                        // 창문: 해시 기반 고정 패턴 (매 프레임 동일)
                        let lit = ((winIdx * 7 + Math.floor(b.x)) % 10) < 7;
                        ctx.fillStyle = lit ? 'rgba(255,255,150,0.5)' : 'rgba(100,150,200,0.3)';
                        ctx.fillRect(wx, wy, 14, 16);
                        // 발코니 난간
                        ctx.strokeStyle = 'rgba(200,200,200,0.4)'; ctx.lineWidth = 1;
                        ctx.strokeRect(wx - 1, wy + 16, 16, 8);
                        winIdx++;
                    }
                }
                // 옥상 구조물
                ctx.fillStyle = darkenColor(b.color, 15);
                ctx.fillRect(bx + b.width * 0.3, GROUND_Y - b.height - 15, b.width * 0.4, 15);
                break;
            }
            case 'mountain_peak': {
                // 산
                ctx.fillStyle = '#4A7023';
                ctx.beginPath(); ctx.moveTo(bx, GROUND_Y); ctx.lineTo(bx + b.width / 2, GROUND_Y - b.height); ctx.lineTo(bx + b.width, GROUND_Y); ctx.closePath(); ctx.fill();
                ctx.fillStyle = '#5A8033';
                ctx.beginPath(); ctx.moveTo(bx + b.width * 0.2, GROUND_Y); ctx.lineTo(bx + b.width * 0.45, GROUND_Y - b.height * 0.7); ctx.lineTo(bx + b.width * 0.7, GROUND_Y); ctx.closePath(); ctx.fill();
                // 눈 덮인 꼭대기
                if (b.height > 250) {
                    ctx.fillStyle = 'rgba(255,255,255,0.6)';
                    ctx.beginPath(); ctx.moveTo(bx + b.width * 0.4, GROUND_Y - b.height * 0.85); ctx.lineTo(bx + b.width / 2, GROUND_Y - b.height); ctx.lineTo(bx + b.width * 0.6, GROUND_Y - b.height * 0.85); ctx.closePath(); ctx.fill();
                }
                break;
            }
            case 'pine_tree': {
                // 소나무
                ctx.fillStyle = '#4A3520';
                ctx.fillRect(bx + b.width * 0.35, GROUND_Y - b.height * 0.3, b.width * 0.3, b.height * 0.3);
                ctx.fillStyle = '#1B5E20';
                for (let ly = 0; ly < 3; ly++) {
                    let tw = b.width * (1 - ly * 0.2);
                    let ty = GROUND_Y - b.height * 0.3 - ly * b.height * 0.25;
                    ctx.beginPath(); ctx.moveTo(bx + b.width / 2 - tw / 2, ty); ctx.lineTo(bx + b.width / 2, ty - b.height * 0.3); ctx.lineTo(bx + b.width / 2 + tw / 2, ty); ctx.closePath(); ctx.fill();
                }
                break;
            }
            case 'highway_car': {
                ctx.fillStyle = b.carColor;
                roundRect(ctx, bx, GROUND_Y - b.height - 50, b.width, b.height, 3); ctx.fill();
                ctx.fillStyle = lightenColor(b.carColor, 30);
                roundRect(ctx, bx + b.width * 0.15, GROUND_Y - b.height - 62, b.width * 0.7, 14, 3); ctx.fill();
                ctx.fillStyle = 'rgba(180,220,255,0.6)';
                ctx.fillRect(bx + b.width * 0.2, GROUND_Y - b.height - 60, b.width * 0.25, 10);
                ctx.fillRect(bx + b.width * 0.52, GROUND_Y - b.height - 60, b.width * 0.25, 10);
                break;
            }
            case 'terminal_building': {
                ctx.fillStyle = '#D0D0D0';
                ctx.fillRect(bx, GROUND_Y - b.height, b.width, b.height);
                ctx.fillStyle = '#A0A0A0';
                ctx.fillRect(bx, GROUND_Y - b.height - 10, b.width, 10);
                // 큰 유리창
                ctx.fillStyle = 'rgba(150,200,255,0.4)';
                for (let wx = bx + 15; wx < bx + b.width - 15; wx += 30)
                    ctx.fillRect(wx, GROUND_Y - b.height + 15, 20, b.height - 40);
                // 간판
                ctx.fillStyle = '#1565C0'; ctx.fillRect(bx + b.width * 0.3, GROUND_Y - b.height - 25, b.width * 0.4, 15);
                ctx.fillStyle = '#FFF'; ctx.font = 'bold 9px Malgun Gothic'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText('터미널', bx + b.width * 0.5, GROUND_Y - b.height - 18);
                break;
            }
            case 'bus': {
                ctx.fillStyle = b.busColor;
                roundRect(ctx, bx, GROUND_Y - b.height - 5, b.width, b.height, 4); ctx.fill();
                ctx.fillStyle = 'rgba(180,220,255,0.6)';
                for (let wx = bx + 10; wx < bx + b.width - 10; wx += 14)
                    ctx.fillRect(wx, GROUND_Y - b.height + 3, 9, 12);
                ctx.fillStyle = '#222';
                ctx.beginPath(); ctx.arc(bx + 15, GROUND_Y - 3, 5, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(bx + b.width - 15, GROUND_Y - 3, 5, 0, Math.PI * 2); ctx.fill();
                break;
            }
            case 'platform_roof': {
                ctx.fillStyle = '#888';
                ctx.fillRect(bx, GROUND_Y - b.height - 80, b.width, 8);
                // 기둥
                for (let px = bx + 30; px < bx + b.width; px += 80) {
                    ctx.fillStyle = '#777';
                    ctx.fillRect(px, GROUND_Y - b.height - 80, 6, b.height + 80);
                }
                // 지붕
                ctx.fillStyle = '#666';
                ctx.fillRect(bx - 10, GROUND_Y - b.height - 88, b.width + 20, 10);
                break;
            }
            case 'house': {
                // 집 벽
                ctx.fillStyle = b.wallColor;
                ctx.fillRect(bx, GROUND_Y - b.height, b.width, b.height);
                // 지붕
                ctx.fillStyle = b.roofColor;
                ctx.beginPath(); ctx.moveTo(bx - 8, GROUND_Y - b.height); ctx.lineTo(bx + b.width / 2, GROUND_Y - b.height - 30); ctx.lineTo(bx + b.width + 8, GROUND_Y - b.height); ctx.closePath(); ctx.fill();
                // 창문
                ctx.fillStyle = 'rgba(255,255,200,0.6)';
                ctx.fillRect(bx + 10, GROUND_Y - b.height + 15, 16, 14);
                ctx.fillRect(bx + b.width - 26, GROUND_Y - b.height + 15, 16, 14);
                // 문
                ctx.fillStyle = '#5D3A1A';
                ctx.fillRect(bx + b.width / 2 - 8, GROUND_Y - 35, 16, 35);
                // 굴뚝
                ctx.fillStyle = '#8B4513';
                ctx.fillRect(bx + b.width * 0.7, GROUND_Y - b.height - 40, 10, 20);
                break;
            }
        }
    });
}

function drawStageGroundDecor(bgType, scrollX) {
    let so = bgScroll % 60;

    bgDecor.forEach(d => {
        let dx = ((d.x - scrollX) % (canvas.width + 200));
        if (dx < -50) dx += canvas.width + 200;

        switch (d.type) {
            case 'flower': {
                ctx.fillStyle = d.color;
                ctx.beginPath(); ctx.arc(dx, GROUND_Y + 8, 4, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#4CAF50';
                ctx.fillRect(dx - 1, GROUND_Y + 10, 2, 8);
                break;
            }
            case 'parking_line': {
                ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(dx, GROUND_Y + 5); ctx.lineTo(dx, GROUND_Y + 35); ctx.stroke();
                break;
            }
            case 'streetlamp': {
                ctx.fillStyle = '#555'; ctx.fillRect(dx, GROUND_Y - 100, 4, 100);
                ctx.fillStyle = '#666'; ctx.fillRect(dx - 8, GROUND_Y - 102, 20, 4);
                ctx.fillStyle = 'rgba(255,255,200,0.15)';
                ctx.beginPath(); ctx.moveTo(dx + 2, GROUND_Y - 98); ctx.lineTo(dx - 30, GROUND_Y); ctx.lineTo(dx + 34, GROUND_Y); ctx.closePath(); ctx.fill();
                break;
            }
            case 'crosswalk': {
                ctx.fillStyle = 'rgba(255,255,255,0.2)';
                ctx.fillRect(dx, GROUND_Y + 3, 20, 4);
                break;
            }
            case 'laundry': {
                ctx.strokeStyle = 'rgba(150,150,150,0.5)'; ctx.lineWidth = 1;
                ctx.beginPath(); ctx.moveTo(dx - 30, GROUND_Y - 140); ctx.lineTo(dx + 30, GROUND_Y - 135); ctx.stroke();
                d.colors.forEach((c, i) => {
                    ctx.fillStyle = c;
                    ctx.fillRect(dx - 20 + i * 18, GROUND_Y - 138, 10, 15);
                });
                break;
            }
            case 'cat': {
                ctx.fillStyle = d.color;
                ctx.beginPath(); ctx.arc(dx, GROUND_Y - 8, 6, 0, Math.PI * 2); ctx.fill();
                // 귀
                ctx.beginPath(); ctx.moveTo(dx - 5, GROUND_Y - 13); ctx.lineTo(dx - 3, GROUND_Y - 18); ctx.lineTo(dx - 1, GROUND_Y - 13); ctx.fill();
                ctx.beginPath(); ctx.moveTo(dx + 1, GROUND_Y - 13); ctx.lineTo(dx + 3, GROUND_Y - 18); ctx.lineTo(dx + 5, GROUND_Y - 13); ctx.fill();
                // 꼬리
                ctx.strokeStyle = d.color; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(dx + 6, GROUND_Y - 8); ctx.quadraticCurveTo(dx + 15, GROUND_Y - 18, dx + 12, GROUND_Y - 5); ctx.stroke();
                break;
            }
            case 'banner': {
                ctx.fillStyle = d.color;
                roundRect(ctx, dx - 15, GROUND_Y - 60, 30, 18, 3); ctx.fill();
                ctx.fillStyle = '#FFF'; ctx.font = 'bold 8px Malgun Gothic'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(d.text, dx, GROUND_Y - 51);
                ctx.fillStyle = '#555'; ctx.fillRect(dx - 1, GROUND_Y - 42, 2, 42);
                break;
            }
            case 'grass_tuft': {
                ctx.strokeStyle = '#3A8B3A'; ctx.lineWidth = 1.5;
                ctx.beginPath(); ctx.moveTo(dx, GROUND_Y + 2); ctx.lineTo(dx - 3, GROUND_Y - 6); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(dx + 2, GROUND_Y + 2); ctx.lineTo(dx + 4, GROUND_Y - 8); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(dx + 4, GROUND_Y + 2); ctx.lineTo(dx + 8, GROUND_Y - 5); ctx.stroke();
                break;
            }
            case 'playground': {
                // 미끄럼틀
                ctx.fillStyle = '#E53935';
                ctx.beginPath(); ctx.moveTo(dx, GROUND_Y - 40); ctx.lineTo(dx + 30, GROUND_Y); ctx.lineTo(dx + 30, GROUND_Y - 5); ctx.lineTo(dx, GROUND_Y - 45); ctx.closePath(); ctx.fill();
                ctx.fillStyle = '#333'; ctx.fillRect(dx - 2, GROUND_Y - 40, 4, 40);
                break;
            }
            case 'rock': {
                ctx.fillStyle = '#777';
                ctx.beginPath(); ctx.moveTo(dx - 8, GROUND_Y + 2); ctx.quadraticCurveTo(dx - 10, GROUND_Y - 8, dx, GROUND_Y - 10); ctx.quadraticCurveTo(dx + 10, GROUND_Y - 7, dx + 8, GROUND_Y + 2); ctx.closePath(); ctx.fill();
                break;
            }
            case 'lane_mark': {
                ctx.fillStyle = 'rgba(255,255,255,0.4)';
                ctx.fillRect(dx, GROUND_Y + 15, 25, 4);
                break;
            }
            case 'guardrail': {
                ctx.fillStyle = '#AAA';
                ctx.fillRect(dx, GROUND_Y + 3, 80, 3);
                ctx.fillRect(dx, GROUND_Y + 3, 3, 15);
                ctx.fillRect(dx + 40, GROUND_Y + 3, 3, 15);
                ctx.fillRect(dx + 80, GROUND_Y + 3, 3, 15);
                break;
            }
            case 'luggage': {
                ctx.fillStyle = `hsl(${(d.x * 37) % 360}, 50%, 45%)`;
                ctx.fillRect(dx - 8, GROUND_Y - 15, 16, 15);
                ctx.fillStyle = '#333';
                ctx.fillRect(dx - 3, GROUND_Y - 18, 6, 4);
                break;
            }
            case 'rail_track': {
                ctx.fillStyle = '#777';
                ctx.fillRect(dx, GROUND_Y + 30, 40, 3);
                ctx.fillStyle = '#555';
                ctx.fillRect(dx + 5, GROUND_Y + 25, 3, 12);
                ctx.fillRect(dx + 20, GROUND_Y + 25, 3, 12);
                ctx.fillRect(dx + 35, GROUND_Y + 25, 3, 12);
                break;
            }
            case 'train_car': {
                ctx.fillStyle = d.color;
                roundRect(ctx, dx, GROUND_Y - 120, 120, 50, 5); ctx.fill();
                ctx.fillStyle = 'rgba(180,220,255,0.5)';
                for (let wx = dx + 10; wx < dx + 110; wx += 25)
                    ctx.fillRect(wx, GROUND_Y - 112, 16, 20);
                ctx.fillStyle = lightenColor(d.color, 30);
                ctx.fillRect(dx, GROUND_Y - 72, 120, 5);
                break;
            }
            case 'fence': {
                ctx.fillStyle = '#DDD';
                ctx.fillRect(dx, GROUND_Y + 3, 2, 25);
                ctx.fillRect(dx, GROUND_Y + 8, 40, 3);
                ctx.fillRect(dx, GROUND_Y + 18, 40, 3);
                break;
            }
        }
    });

    // 기본 바닥 마킹 (도로형 스테이지)
    if (['road', 'highway', 'parking'].includes(bgType)) {
        for (let gx = -so; gx < canvas.width + 30; gx += 80) {
            ctx.fillStyle = 'rgba(255,255,255,0.15)';
            ctx.fillRect(gx, GROUND_Y + 4, 30, 3);
        }
    } else {
        for (let gx = -so; gx < canvas.width + 30; gx += 60) {
            ctx.fillStyle = darkenColor(STAGES[currentStage].bgColor2, 10);
            ctx.fillRect(gx, GROUND_Y + 4, 12, 3);
        }
    }
}

    ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 3;
    roundRect(ctx, panelX, panelY, panelW, panelH, 18); ctx.stroke();

    let cx = canvas.width / 2;
    let cy = panelY + panelH / 2;

    ctx.textBaseline = 'middle'; ctx.textAlign = 'center';
    ctx.fillStyle = '#FFF'; ctx.font = 'bold 42px Malgun Gothic'; ctx.fillText('축하합니다!', cx, cy - 170);
    ctx.fillStyle = '#FFD700'; ctx.font = '20px Malgun Gothic'; ctx.fillText('모든 스테이지를 클리어했습니다!', cx, cy - 125);
    ctx.font = '70px serif'; ctx.fillText('\uD83D\uDC69\u200D\u2764\uFE0F\u200D\uD83D\uDC68', cx, cy - 55);
    ctx.fillStyle = '#FFF'; ctx.font = '18px Malgun Gothic';
    ctx.fillText('남편은 다시는 심방에서 도망가지 않겠다고', cx, cy + 10);
    ctx.fillText('굳게 약속했습니다... (과연?)', cx, cy + 38);

    ctx.fillStyle = '#FF6B6B'; ctx.font = 'bold 26px Malgun Gothic';
    ctx.fillText(`최종 점수: ${totalScore}`, cx, cy + 85);

    let grade = totalScore > 50000 ? 'S' : totalScore > 30000 ? 'A' : totalScore > 15000 ? 'B' : 'C';
    let gradeColor = grade === 'S' ? '#FFD700' : grade === 'A' ? '#2ECC71' : grade === 'B' ? '#3498DB' : '#CCC';
    // 등급 패널
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    roundRect(ctx, cx - 100, cy + 115, 200, 60, 10); ctx.fill();
    ctx.strokeStyle = gradeColor; ctx.lineWidth = 2;
    roundRect(ctx, cx - 100, cy + 115, 200, 60, 10); ctx.stroke();
    ctx.fillStyle = gradeColor;
    ctx.font = 'bold 44px Malgun Gothic'; ctx.fillText(`등급: ${grade}`, cx, cy + 145);

    let pu = Math.sin(Date.now() * 0.005) * 0.3 + 0.7;
    ctx.fillStyle = `rgba(255,255,255,${pu})`; ctx.font = 'bold 18px Malgun Gothic';
    ctx.fillText('클릭 / 터치하여 처음부터!', cx, panelY + panelH + 30);
}

// ========== 유틸 ==========
function roundRect(c, x, y, w, h, r) { if (w < r * 2) r = w / 2; if (h < r * 2) r = h / 2; c.beginPath(); c.moveTo(x + r, y); c.lineTo(x + w - r, y); c.quadraticCurveTo(x + w, y, x + w, y + r); c.lineTo(x + w, y + h - r); c.quadraticCurveTo(x + w, y + h, x + w - r, y + h); c.lineTo(x + r, y + h); c.quadraticCurveTo(x, y + h, x, y + h - r); c.lineTo(x, y + r); c.quadraticCurveTo(x, y, x + r, y); c.closePath(); }
function lightenColor(h, a) { if (!h || !h.startsWith('#') || h.length < 7) return h; return `rgb(${Math.min(255, parseInt(h.slice(1, 3), 16) + a)},${Math.min(255, parseInt(h.slice(3, 5), 16) + a)},${Math.min(255, parseInt(h.slice(5, 7), 16) + a)})`; }
function darkenColor(h, a) { if (!h || !h.startsWith('#') || h.length < 7) return h; return `rgb(${Math.max(0, parseInt(h.slice(1, 3), 16) - a)},${Math.max(0, parseInt(h.slice(3, 5), 16) - a)},${Math.max(0, parseInt(h.slice(5, 7), 16) - a)})`; }

// ========== 렌더 ==========
function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (gameState === 'menu') { drawMenu(); return; }
    if (gameState === 'storyIntro') { drawStoryIntro(); return; }
    if (gameState === 'stageClear') { drawStageClear(); return; }
    if (gameState === 'gameOver') { drawGameOver(); return; }
    if (gameState === 'ending') { drawEnding(); return; }

    ctx.save();
    if (shakeTimer > 0) ctx.translate((Math.random() - 0.5) * shakeIntensity, (Math.random() - 0.5) * shakeIntensity);

    drawBackground();
    obstacles.forEach(drawObstacle);
    items.forEach(drawItem);

    npcBlockers.forEach(drawNpcBlocker);

    drawHusband(husband.x, husband.y, husband.frame, husband.scared, GROUND_Y);
    drawWife(wife.x, wife.y, wife.frame, GROUND_Y);

    drawActiveEffects();

    if (wife.speedBoost > 0.3) { for (let i = 0; i < 3; i++) { ctx.fillStyle = `rgba(233,69,96,${wife.speedBoost * 0.15})`; ctx.beginPath(); ctx.arc(wife.x - 20 - Math.random() * 25, wife.y - 25 + Math.random() * 30, 3 + Math.random() * 4, 0, Math.PI * 2); ctx.fill(); } }

    particles.forEach(p => { ctx.globalAlpha = p.life; if (p.isText) { ctx.fillStyle = p.color; ctx.font = `bold ${p.size}px Malgun Gothic`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(p.text, p.x, p.y); } else { ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2); ctx.fill(); } ctx.globalAlpha = 1; });

    ctx.restore();

    drawMessage();
    drawUI();
    drawTutorial();
}

function gameLoop() { update(); render(); requestAnimationFrame(gameLoop); }
gameLoop();
</script>
</body>
