                ctx.fillStyle = '#777';
                ctx.fillRect(dx, GROUND_Y + 30, 40, 3);
                ctx.fillStyle = '#555';
                ctx.fillRect(dx + 5, GROUND_Y + 25, 3, 12);
                ctx.fillRect(dx + 20, GROUND_Y + 25, 3, 12);
                ctx.fillRect(dx + 35, GROUND_Y + 25, 3, 12);
                break;
            }
            case 'train_car': {
                ctx.fillStyle = d.color;
                roundRect(ctx, dx, GROUND_Y - 120, 120, 50, 5); ctx.fill();
                ctx.fillStyle = 'rgba(180,220,255,0.5)';
                for (let wx = dx + 10; wx < dx + 110; wx += 25)
                    ctx.fillRect(wx, GROUND_Y - 112, 16, 20);
                ctx.fillStyle = lightenColor(d.color, 30);
                ctx.fillRect(dx, GROUND_Y - 72, 120, 5);
                break;
            }
            case 'fence': {
                ctx.fillStyle = '#DDD';
                ctx.fillRect(dx, GROUND_Y + 3, 2, 25);
                ctx.fillRect(dx, GROUND_Y + 8, 40, 3);
                ctx.fillRect(dx, GROUND_Y + 18, 40, 3);
                break;
            }
            // (옥상용 노을 태양은 drawBackground에서 고정 위치로 그림)
            // 심야 집 앞 데코
            case 'home_streetlamp': {
                ctx.fillStyle = '#3a3a3a';
                ctx.fillRect(dx, GROUND_Y - 110, 4, 110);
                ctx.fillStyle = '#555';
                ctx.fillRect(dx - 10, GROUND_Y - 112, 24, 5);
                let bulbGlow = 0.65 + Math.sin(Date.now() * 0.003 + d.x * 0.01) * 0.08;
                let gLamp = ctx.createRadialGradient(dx + 2, GROUND_Y - 105, 2, dx + 2, GROUND_Y - 105, 24);
                gLamp.addColorStop(0, `rgba(255,240,170,${bulbGlow})`);
                gLamp.addColorStop(1, 'rgba(255,240,170,0)');
                ctx.fillStyle = gLamp;
                ctx.beginPath(); ctx.arc(dx + 2, GROUND_Y - 105, 24, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = 'rgba(255,240,170,0.10)';
                ctx.beginPath();
                ctx.moveTo(dx + 2, GROUND_Y - 100);
                ctx.lineTo(dx - 42, GROUND_Y);
                ctx.lineTo(dx + 46, GROUND_Y);
                ctx.closePath(); ctx.fill();
                break;
            }
            case 'firefly': {
                let fy = 220 + ((Math.floor(d.x * 7)) % 180) + Math.sin(Date.now() * 0.002 + d.x) * 10;
                let fg = 0.45 + Math.sin(Date.now() * 0.005 + d.x * 0.1) * 0.25;
                let grad = ctx.createRadialGradient(dx, fy, 0, dx, fy, 10);
                grad.addColorStop(0, `rgba(180,255,120,${fg})`);
                grad.addColorStop(1, 'rgba(180,255,120,0)');
                ctx.fillStyle = grad;
                ctx.beginPath(); ctx.arc(dx, fy, 10, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = `rgba(220,255,180,${fg + 0.3})`;
                ctx.fillRect(dx - 1, fy - 1, 2, 2);
                break;
            }
            case 'rooftop_antenna': {
                // 안테나 (바닥 바로 위)
                ctx.strokeStyle = '#222'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(dx, GROUND_Y); ctx.lineTo(dx, GROUND_Y - 48); ctx.stroke();
                for (let i = 0; i < 3; i++) {
                    ctx.beginPath();
                    ctx.moveTo(dx - (10 - i * 3), GROUND_Y - 18 - i * 10);
                    ctx.lineTo(dx + (10 - i * 3), GROUND_Y - 18 - i * 10);
                    ctx.stroke();
                }
                ctx.fillStyle = '#E74C3C';
                ctx.beginPath(); ctx.arc(dx, GROUND_Y - 50, 2.5, 0, Math.PI * 2); ctx.fill();
                break;
            }
            case 'rooftop_tank': {
                // 물탱크 (옥상 위의 실린더)
                ctx.fillStyle = '#5a5d6a';
                ctx.fillRect(dx - 15, GROUND_Y - 40, 30, 30);
                ctx.fillStyle = '#777';
                ctx.beginPath(); ctx.ellipse(dx, GROUND_Y - 40, 15, 5, 0, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#3a3d4a';
                ctx.fillRect(dx - 18, GROUND_Y - 10, 36, 10);
                break;
            }
            case 'rooftop_ac': {
                // 옥상 에어컨 실외기
                ctx.fillStyle = '#8a8d95';
                ctx.fillRect(dx - 14, GROUND_Y - 22, 28, 22);
                ctx.fillStyle = '#3c3e44';
                ctx.beginPath(); ctx.arc(dx, GROUND_Y - 11, 7, 0, Math.PI * 2); ctx.fill();
                ctx.strokeStyle = '#555'; ctx.lineWidth = 1;
                for (let i = -4; i <= 4; i += 2) {
                    ctx.beginPath(); ctx.moveTo(dx + i, GROUND_Y - 7); ctx.lineTo(dx + i + 2, GROUND_Y - 15); ctx.stroke();
                }
                break;
            }
            // 지하철 데코
            case 'subway_light': {
                // 천장 조명
                ctx.fillStyle = 'rgba(255,255,200,0.9)';
                ctx.fillRect(dx - 20, 50, 40, 4);
                // 아래로 퍼지는 빛
                let lg = ctx.createLinearGradient(dx, 54, dx, GROUND_Y);
                lg.addColorStop(0, 'rgba(255,255,200,0.18)');
                lg.addColorStop(1, 'rgba(255,255,200,0)');
                ctx.fillStyle = lg;
                ctx.beginPath(); ctx.moveTo(dx - 20, 54); ctx.lineTo(dx + 20, 54); ctx.lineTo(dx + 50, GROUND_Y); ctx.lineTo(dx - 50, GROUND_Y); ctx.closePath(); ctx.fill();
                break;
            }
            case 'subway_rail': {
                // 레일 2줄 (바닥)
                ctx.fillStyle = '#888';
                ctx.fillRect(dx, GROUND_Y + 20, 80, 3);
                ctx.fillRect(dx, GROUND_Y + 36, 80, 3);
                // 침목
                ctx.fillStyle = '#4a3220';
                for (let tx = 0; tx < 80; tx += 22) ctx.fillRect(dx + tx, GROUND_Y + 18, 10, 25);
                break;
            }
            case 'subway_car': {
                // 객차 - 지면 위에 있는 차량
                ctx.fillStyle = d.color;
                roundRect(ctx, dx, GROUND_Y - 100, 320, 70, 8); ctx.fill();
                ctx.fillStyle = lightenColor(d.color, 20);
                ctx.fillRect(dx, GROUND_Y - 88, 320, 4);
                // 창문 열
                ctx.fillStyle = 'rgba(180,220,255,0.65)';
                for (let wx = dx + 14; wx < dx + 300; wx += 35) {
                    ctx.fillRect(wx, GROUND_Y - 82, 24, 30);
                }
                // 문
                ctx.fillStyle = darkenColor(d.color, 15);
                ctx.fillRect(dx + 50, GROUND_Y - 48, 26, 18);
                ctx.fillRect(dx + 220, GROUND_Y - 48, 26, 18);
                // 바퀴
                ctx.fillStyle = '#111';
                ctx.beginPath(); ctx.arc(dx + 40, GROUND_Y - 28, 8, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(dx + 280, GROUND_Y - 28, 8, 0, Math.PI * 2); ctx.fill();
                break;
            }
        }
    });

    // 기본 바닥 마킹 (도로형 스테이지)
    if (['road', 'highway', 'parking'].includes(bgType)) {
        for (let gx = -so; gx < canvas.width + 30; gx += 80) {
            ctx.fillStyle = 'rgba(255,255,255,0.15)';
            ctx.fillRect(gx, GROUND_Y + 4, 30, 3);
        }
    } else {
        for (let gx = -so; gx < canvas.width + 30; gx += 60) {
            ctx.fillStyle = darkenColor(getActiveStages()[currentStage].bgColor2, 10);
            ctx.fillRect(gx, GROUND_Y + 4, 12, 3);
        }
    }
}

// ========== UI ==========
function drawUI() {
    const s = getEffectiveStage();
    const dmode = DIFFICULTY[difficulty];
    ctx.fillStyle = 'rgba(0,0,0,0.75)'; roundRect(ctx, 10, 8, canvas.width - 20, 55, 8); ctx.fill();
    // 모드 배지
    ctx.fillStyle = dmode.color; ctx.font = 'bold 11px Malgun Gothic'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText(`[${dmode.emoji}${dmode.name}]`, 20, 18);
    ctx.fillStyle = '#FFD700'; ctx.font = 'bold 15px Malgun Gothic'; ctx.fillText(s.name, 20, 40);
    // 점수는 일시정지/나가기 버튼과 겹치지 않게 왼쪽으로 이동 (버튼은 x>=canvas.width-100)
    let scoreRight = canvas.width - 115;
    ctx.fillStyle = '#FFF'; ctx.font = 'bold 14px Malgun Gothic'; ctx.textAlign = 'right'; ctx.fillText(`점수: ${score}`, scoreRight, 24);
    ctx.fillStyle = '#AAA'; ctx.font = '11px Malgun Gothic'; ctx.fillText(`총점: ${totalScore + score}`, scoreRight, 44);

    let barX = 200, barW = 500, barY = 40, barH = 14;
    let ratio = 1 - Math.min(distance / (s.catchDist + 200), 1);
    ctx.fillStyle = 'rgba(0,0,0,0.5)'; roundRect(ctx, barX, barY, barW, barH, 7); ctx.fill();
    let bc = ratio > 0.7 ? '#2ECC71' : ratio > 0.4 ? '#F39C12' : '#E74C3C';
    if (barW * ratio > 1) { ctx.fillStyle = bc; roundRect(ctx, barX, barY, Math.max(barW * ratio, 14), barH, 7); ctx.fill(); }
    ctx.font = '14px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('\uD83D\uDC69', barX + Math.max(barW * ratio, 10), barY - 8);
    ctx.fillText('\uD83C\uDFC3', barX + barW, barY - 8);
    ctx.fillStyle = '#FFF'; ctx.font = 'bold 10px Malgun Gothic'; ctx.fillText(`${Math.max(0, Math.floor(distance))}m`, barX + barW / 2, barY + 7);

    if (comboCount > 1) { ctx.fillStyle = `rgba(255,215,0,${0.7 + Math.sin(Date.now() * 0.01) * 0.3})`; ctx.font = `bold ${16 + comboCount * 2}px Malgun Gothic`; ctx.textAlign = 'center'; ctx.textBaseline = 'top'; ctx.fillText(`${comboCount}x 콤보!`, canvas.width / 2, 68); }

    if (husband.slowEffects.length > 0) {
        let ph = 18 + husband.slowEffects.length * 16;
        ctx.fillStyle = 'rgba(0,0,0,0.65)'; roundRect(ctx, 10, 70, 220, ph, 6); ctx.fill();
        ctx.fillStyle = '#FF6B6B'; ctx.font = 'bold 10px Malgun Gothic'; ctx.textAlign = 'left'; ctx.textBaseline = 'top'; ctx.fillText('남편 감속:', 16, 74);
        husband.slowEffects.forEach((e, i) => { ctx.fillStyle = '#FFF'; ctx.font = '10px Malgun Gothic'; ctx.fillText(`${e.name} (${(e.remaining / 60).toFixed(1)}s)`, 22, 90 + i * 16); });
    }

    let lx = canvas.width - 185, ly = canvas.height - 65;
    ctx.fillStyle = 'rgba(0,0,0,0.7)'; roundRect(ctx, lx, ly, 175, 55, 6); ctx.fill();
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#00FF66'; ctx.font = 'bold 12px Malgun Gothic'; ctx.fillText('\u25CF', lx + 10, ly + 16);
    ctx.fillStyle = '#88FF88'; ctx.font = '11px Malgun Gothic'; ctx.fillText('빛나는 것 = 먹기!', lx + 25, ly + 16);
    ctx.fillStyle = '#888'; ctx.font = 'bold 12px Malgun Gothic'; ctx.fillText('\u25CB', lx + 10, ly + 38);
    ctx.fillStyle = '#AAA'; ctx.font = '11px Malgun Gothic'; ctx.fillText('흐린 사람 = 자동 통과', lx + 25, ly + 38);
    ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.font = '11px Malgun Gothic'; ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
    ctx.fillText('\u2191/Space: 점프(2단!) | \u2192: 가속', canvas.width / 2, canvas.height - 8);
}

function drawTutorial() {
    if (stageTimer > 300) return;
    let a = stageTimer < 240 ? 0.9 : (300 - stageTimer) / 60;
    ctx.save(); ctx.globalAlpha = a;

    // 모드 버튼 4개 (2x2 그리드, 자동 중앙정렬)
    MODE_LIST.forEach((mode, i) => {
        let r = getMenuButtonRect(i);
        let d = DIFFICULTY[mode];

        // 외곽 글로우

        // 배경
        let cR = parseInt(d.color.slice(1,3),16), cG = parseInt(d.color.slice(3,5),16), cB = parseInt(d.color.slice(5,7),16);
        ctx.fillStyle = isSelected ? `rgba(${cR},${cG},${cB},0.3)` : 'rgba(20,20,40,0.85)';
        roundRect(ctx, r.x, r.y, r.w, r.h, 10); ctx.fill();
        // 테두리
        ctx.strokeStyle = isSelected ? d.color : 'rgba(255,255,255,0.25)';
        ctx.lineWidth = isSelected ? 3 : 2;
        roundRect(ctx, r.x, r.y, r.w, r.h, 10); ctx.stroke();
        ctx.shadowBlur = 0;

        // 이모지 (왼쪽)
        ctx.font = '34px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(d.emoji, r.x + 36, r.y + r.h / 2);

        // 모드 이름
        ctx.fillStyle = isSelected ? d.color : '#DDD';
        ctx.font = `bold ${isSelected ? 26 : 24}px Malgun Gothic`;
        ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
        ctx.fillText(d.name, r.x + 70, r.y + 30);

        // 설명
        ctx.fillStyle = isSelected ? '#FFF' : '#AAA';
        ctx.font = '11px Malgun Gothic';
        ctx.fillText(d.desc, r.x + 70, r.y + 55);

        // 12 STAGES 표시
        ctx.fillStyle = isSelected ? d.color : '#888';
        ctx.font = 'bold 10px Malgun Gothic';
        ctx.fillText('▸ 12 STAGES', r.x + 70, r.y + 73);

        // 난이도 막대
        let bars = i + 1;
        for (let b = 0; b < 4; b++) {
            ctx.fillStyle = b < bars ? d.color : 'rgba(255,255,255,0.15)';
            ctx.fillRect(r.x + 70 + b * 18, r.y + 88, 12, 6);
        }

        // 선택 화살표
        if (isSelected) {
            ctx.fillStyle = d.color;
            ctx.font = `bold 22px serif`;
            ctx.textAlign = 'center';
            let arrowOff = Math.sin(Date.now() * 0.01) * 4;
            ctx.fillText('▶', r.x - 14 - arrowOff, r.y + r.h / 2);
            ctx.fillText('◀', r.x + r.w + 14 + arrowOff, r.y + r.h / 2);
        }
    });

    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#888'; ctx.font = '11px Malgun Gothic';
    ctx.fillText('방향키/마우스로 선택 · Space/Enter/클릭으로 시작', canvas.width / 2, canvas.height - 30);
}

function togglePause() {
    if (gameState === 'playing') {
        // 일시정지 직전의 완성된 프레임을 캡처하여 보존 (다른 스테이지 화면 오염 방지)
        try { pauseSnapshot = ctx.getImageData(0, 0, canvas.width, canvas.height); }
        catch (e) { pauseSnapshot = null; }
        gameState = 'paused';
    }
    else if (gameState === 'paused') {
        pauseSnapshot = null;

    }
}

    ctx.textBaseline = 'middle'; ctx.textAlign = 'center';
    let dmodeG = DIFFICULTY[difficulty];
    ctx.fillStyle = dmodeG.color; ctx.font = 'bold 13px Malgun Gothic';
    ctx.fillText(`[ ${dmodeG.emoji} ${dmodeG.name} MODE ]`, cxG, cyG - 145);
    ctx.fillStyle = '#E74C3C'; ctx.font = 'bold 38px Malgun Gothic'; ctx.fillText('남편이 도망갔다...', cxG, cyG - 105);
    return drawGameOverRest(cxG, cyG, panelY, panelH);
}
function drawGameOverRest(cx, cy, panelY, panelH) {
    ctx.font = '60px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('🏃💨', cx, cy - 40);
    let msgs = ['"자기야~ 나 PC방 갔다올게~"', '"심방은 다음에 하지 뭐~"', '"탈출 성공!"', '"낚시 가야지~"'];
    ctx.fillStyle = '#FFB6C1'; ctx.font = '17px Malgun Gothic';
    ctx.fillText(msgs[Math.floor(Date.now() / 3000) % msgs.length], cx, cy + 35);
    ctx.fillStyle = '#FFD700'; ctx.font = 'bold 18px Malgun Gothic'; ctx.fillText(`점수: ${score}`, cx, cy + 75);
    ctx.fillStyle = '#AAA'; ctx.font = '12px Malgun Gothic';
    ctx.fillText(`${getActiveStages()[currentStage].name}에서 실패`, cx, cy + 105);
    ctx.fillStyle = '#888'; ctx.font = '11px Malgun Gothic';
    ctx.fillText('(같은 모드의 1단계부터 다시 시작)', cx, cy + 125);
    let pu = Math.sin(Date.now() * 0.005) * 0.3 + 0.7;
    ctx.fillStyle = `rgba(255,255,255,${pu})`; ctx.font = 'bold 18px Malgun Gothic';
    ctx.fillText('클릭 / 터치하여 재도전!', cx, panelY + panelH + 30);
}
function drawGameOverDeprecated() {
    ctx.fillStyle = '#E74C3C'; ctx.font = 'bold 48px Malgun Gothic'; ctx.fillText('남편이 도망갔다...', canvas.width / 2, 180);
    ctx.font = '80px serif'; ctx.fillText('\uD83C\uDFC3\uD83D\uDCA8', canvas.width / 2, 300);
    let msgs = ['"자기야~ 나 PC방 갔다올게~"', '"심방은 다음에 하지 뭐~"', '"탈출 성공!"', '"낚시 가야지~"'];
    ctx.fillStyle = '#AAA'; ctx.font = '20px Malgun Gothic'; ctx.fillText(msgs[Math.floor(Date.now() / 3000) % msgs.length], canvas.width / 2, 390);
    ctx.fillStyle = '#FFD700'; ctx.font = '18px Malgun Gothic'; ctx.fillText(`점수: ${score}`, canvas.width / 2, 440);
    let pu = Math.sin(Date.now() * 0.005) * 0.3 + 0.7;
    ctx.fillStyle = `rgba(255,255,255,${pu})`; ctx.font = 'bold 20px Malgun Gothic'; ctx.fillText('클릭 / 터치하여 재도전!', canvas.width / 2, 510);
}

function drawEnding() {
    let g = ctx.createLinearGradient(0, 0, 0, canvas.height); g.addColorStop(0, '#FF6B6B'); g.addColorStop(0.5, '#FFB6C1'); g.addColorStop(1, '#FFD700');
    ctx.fillStyle = g; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.font = '24px serif';
    for (let i = 0; i < 20; i++) { let hx = (Date.now() * 0.03 * (i + 1) * 0.05 + i * 80) % canvas.width; let hy = (Date.now() * 0.015 * (i + 1) * 0.03 + i * 60) % canvas.height; ctx.globalAlpha = 0.4 + Math.sin(i + Date.now() * 0.002) * 0.3; ctx.fillText('\u2764\uFE0F', hx, hy); }
    ctx.globalAlpha = 1;

    // 중앙 패널
    let panelW = 650, panelH = 440;
    let panelX = (canvas.width - panelW) / 2;
    let panelY = (canvas.height - panelH) / 2;
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    roundRect(ctx, panelX, panelY, panelW, panelH, 18); ctx.fill();
    ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 3;
    roundRect(ctx, panelX, panelY, panelW, panelH, 18); ctx.stroke();

    let cx = canvas.width / 2;
    let cy = panelY + panelH / 2;

    ctx.textBaseline = 'middle'; ctx.textAlign = 'center';
    let dmodeE = DIFFICULTY[difficulty];
    ctx.fillStyle = dmodeE.color; ctx.font = 'bold 16px Malgun Gothic';
    ctx.fillText(`★ ${dmodeE.emoji} ${dmodeE.name} MODE 클리어! ★`, cx, cy - 200);
    ctx.fillStyle = '#FFF'; ctx.font = 'bold 42px Malgun Gothic'; ctx.fillText('축하합니다!', cx, cy - 165);
    ctx.fillStyle = '#FFD700'; ctx.font = '18px Malgun Gothic'; ctx.fillText('12개 스테이지를 모두 클리어했습니다!', cx, cy - 125);
    ctx.font = '70px serif'; ctx.fillText('\uD83D\uDC69\u200D\u2764\uFE0F\u200D\uD83D\uDC68', cx, cy - 55);
    ctx.fillStyle = '#FFF'; ctx.font = '18px Malgun Gothic';
    ctx.fillText('남편은 다시는 심방에서 도망가지 않겠다고', cx, cy + 10);
    ctx.fillText('굳게 약속했습니다... (과연?)', cx, cy + 38);

    ctx.fillStyle = '#FF6B6B'; ctx.font = 'bold 26px Malgun Gothic';
    ctx.fillText(`최종 점수: ${totalScore}`, cx, cy + 85);

    let grade = totalScore > 50000 ? 'S' : totalScore > 30000 ? 'A' : totalScore > 15000 ? 'B' : 'C';
    let gradeColor = grade === 'S' ? '#FFD700' : grade === 'A' ? '#2ECC71' : grade === 'B' ? '#3498DB' : '#CCC';
    // 등급 패널
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    roundRect(ctx, cx - 100, cy + 115, 200, 60, 10); ctx.fill();
    ctx.strokeStyle = gradeColor; ctx.lineWidth = 2;
    roundRect(ctx, cx - 100, cy + 115, 200, 60, 10); ctx.stroke();
    ctx.fillStyle = gradeColor;
    ctx.font = 'bold 44px Malgun Gothic'; ctx.fillText(`등급: ${grade}`, cx, cy + 145);

    let pu = Math.sin(Date.now() * 0.005) * 0.3 + 0.7;
    ctx.fillStyle = `rgba(255,255,255,${pu})`; ctx.font = 'bold 18px Malgun Gothic';
    ctx.fillText('클릭 / 터치하여 처음부터!', cx, panelY + panelH + 30);
}

// ========== 유틸 ==========
function roundRect(c, x, y, w, h, r) { if (w < r * 2) r = w / 2; if (h < r * 2) r = h / 2; c.beginPath(); c.moveTo(x + r, y); c.lineTo(x + w - r, y); c.quadraticCurveTo(x + w, y, x + w, y + r); c.lineTo(x + w, y + h - r); c.quadraticCurveTo(x + w, y + h, x + w - r, y + h); c.lineTo(x + r, y + h); c.quadraticCurveTo(x, y + h, x, y + h - r); c.lineTo(x, y + r); c.quadraticCurveTo(x, y, x + r, y); c.closePath(); }
function lightenColor(h, a) { if (!h || !h.startsWith('#') || h.length < 7) return h; return `rgb(${Math.min(255, parseInt(h.slice(1, 3), 16) + a)},${Math.min(255, parseInt(h.slice(3, 5), 16) + a)},${Math.min(255, parseInt(h.slice(5, 7), 16) + a)})`; }
function darkenColor(h, a) { if (!h || !h.startsWith('#') || h.length < 7) return h; return `rgb(${Math.max(0, parseInt(h.slice(1, 3), 16) - a)},${Math.max(0, parseInt(h.slice(3, 5), 16) - a)},${Math.max(0, parseInt(h.slice(5, 7), 16) - a)})`; }

// ========== 렌더 ==========
function render() {
    // 일시정지: 스냅샷이 있으면 그대로 복구하고 오버레이만 그림 (다른 스테이지 씬 오염 방지)
    if (gameState === 'paused' && pauseSnapshot) {
        ctx.putImageData(pauseSnapshot, 0, 0);
        drawPlayingHudButtons();
        drawPauseOverlay();
        return;
    }

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (gameState === 'menu') { drawMenu(); return; }
    if (gameState === 'storyIntro') { drawStoryIntro(); return; }
    if (gameState === 'stageClear') { drawStageClear(); return; }
    if (gameState === 'gameOver') { drawGameOver(); return; }
    if (gameState === 'ending') { drawEnding(); return; }

    ctx.save();
    if (shakeTimer > 0) ctx.translate((Math.random() - 0.5) * shakeIntensity, (Math.random() - 0.5) * shakeIntensity);

    drawBackground();
    obstacles.forEach(drawObstacle);
    items.forEach(drawItem);

    npcBlockers.forEach(drawNpcBlocker);

    drawHusband(husband.x, husband.y, husband.frame, husband.scared, GROUND_Y);
    drawWife(wife.x, wife.y, wife.frame, GROUND_Y);

    drawActiveEffects();

    if (wife.speedBoost > 0.3) { for (let i = 0; i < 3; i++) { ctx.fillStyle = `rgba(233,69,96,${wife.speedBoost * 0.15})`; ctx.beginPath(); ctx.arc(wife.x - 20 - Math.random() * 25, wife.y - 25 + Math.random() * 30, 3 + Math.random() * 4, 0, Math.PI * 2); ctx.fill(); } }

    particles.forEach(p => { ctx.globalAlpha = p.life; if (p.isText) { ctx.fillStyle = p.color; ctx.font = `bold ${p.size}px Malgun Gothic`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(p.text, p.x, p.y); } else { ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2); ctx.fill(); } ctx.globalAlpha = 1; });

    ctx.restore();

    drawMessage();
    drawUI();
    drawTutorial();
    drawPlayingHudButtons();
    if (gameState === 'paused') drawPauseOverlay();
}

function gameLoop() { update(); render(); requestAnimationFrame(gameLoop); }
gameLoop();
</script>
